<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pixie Receptionist — Test Chat</title>
<style>
  :root{--bg:#0a0e17;--panel:#121826;--line:#222c3d;--text:#eaf1ff;--muted:#8a97ad;--accent:#34d399;--cust:#1d4ed8;}
  *{box-sizing:border-box;margin:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .logo{font-weight:800}.logo span{color:var(--accent)}
  .who{margin-left:auto;font-size:.75rem;color:var(--muted)}
  .mode{font-size:.7rem;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  main{flex:1;display:grid;grid-template-columns:1fr 320px;min-height:0}
  @media(max-width:760px){main{grid-template-columns:1fr}.side{display:none}}
  .chat{display:flex;flex-direction:column;min-height:0}
  .log{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex}.row.c{justify-content:flex-end}
  .bub{max-width:78%;padding:11px 14px;border-radius:16px;font-size:.92rem;line-height:1.5}
  .c .bub{background:var(--cust);color:#fff;border-bottom-right-radius:4px}
  .r .bub{background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:4px}
  .composer{display:flex;gap:10px;padding:14px 16px;border-top:1px solid var(--line)}
  input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:12px 14px;font:inherit;outline:none}
  input:focus{border-color:var(--accent)}
  button{border:0;border-radius:12px;padding:0 18px;font-weight:700;background:var(--accent);color:#05231a;cursor:pointer}
  button:disabled{opacity:.5;cursor:wait}
  #mic{background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:1.05rem;padding:0 14px}
  #mic.on{background:#ef4444;color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .spk{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:.85rem;cursor:pointer}
  .cal{border-color:var(--accent)!important}
  .cal a{display:inline-block;margin-top:8px;color:#05231a;background:var(--accent);padding:7px 12px;border-radius:8px;font-weight:700;text-decoration:none;font-size:.78rem}
  /* ── animations ───────────────────────────────────────────── */
  .bub{animation:bubIn .34s cubic-bezier(.22,1,.36,1) both}
  .row.c .bub{animation-name:bubInRight}
  @keyframes bubIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes bubInRight{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  .act{animation:slideIn .34s cubic-bezier(.22,1,.36,1) both}
  @keyframes slideIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
  .cal{animation:slideIn .34s cubic-bezier(.22,1,.36,1) both, glowPulse 1.4s ease-out}
  @keyframes glowPulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}100%{box-shadow:0 0 0 14px rgba(52,211,153,0)}}
  .typing .bub{display:inline-flex;gap:5px;align-items:center;padding:14px 16px}
  .typing .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .typing .dot:nth-child(2){animation-delay:.2s}.typing .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
  .logo.speaking{animation:talk .5s ease-in-out infinite}
  @keyframes talk{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  #send{transition:transform .12s}#send:active{transform:scale(.95)}
  .side{border-left:1px solid var(--line);padding:18px;overflow:auto}
  .side h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:10px}
  .act{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;font-size:.82rem}
  .act .t{font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;font-size:.74rem;margin-bottom:6px}
  .act .kv{color:var(--muted);margin:2px 0}.act .kv b{color:var(--text);font-weight:600}
  .human{color:#fbbf24}
  .usage{font-size:.7rem;color:var(--muted);padding:8px 16px;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <header>
    <div class="logo">✦ Pixie <span>Receptionist</span></div>
    <div class="who" id="who">Glow & Go Salon</div>
    <div class="mode" id="mode">mode: …</div>
  </header>
  <main>
    <div class="chat">
      <div class="log" id="log"></div>
      <div class="usage" id="usage">Type a message to start. Try: "book a haircut Saturday", "how much is bridal makeup?", "I want a refund".</div>
      <div class="composer">
        <button id="mic" title="Hold-free: click and speak">🎤</button>
        <input id="msg" placeholder="Message or 🎤 speak to the receptionist…" autocomplete="off">
        <label class="spk"><input type="checkbox" id="speak" checked> 🔊</label>
        <button id="send">Send</button>
      </div>
    </div>
    <div class="side">
      <h3>Parsed [ACTION] log</h3>
      <div id="actions"></div>
    </div>
  </main>
<script>
  const $=id=>document.getElementById(id);
  const history=[]; let usedVoice=false;
  // Which business this receptionist serves — from ?tenant= (set by onboarding).
  const TENANT = new URLSearchParams(location.search).get('tenant') || 't_demo';
  fetch('/health').then(r=>r.json()).then(d=>{$('mode').textContent='mode: '+(d.model_mode||'?')}).catch(()=>{});
  if(TENANT!=='t_demo'){
    fetch('/onboarding/api/tenant/'+encodeURIComponent(TENANT)).then(r=>r.ok?r.json():null)
      .then(d=>{ if(d&&d.business_name) $('who').textContent=d.business_name; }).catch(()=>{});
  }

  function bubble(text, who){const row=document.createElement('div');row.className='row '+(who==='c'?'c':'r');
    const b=document.createElement('div');b.className='bub';b.textContent=text;row.appendChild(b);$('log').appendChild(row);$('log').scrollTop=1e9;}

  let typingEl=null;
  function showTyping(){const row=document.createElement('div');row.className='row r typing';
    row.innerHTML='<div class="bub"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    $('log').appendChild(row);$('log').scrollTop=1e9;typingEl=row;}
  function hideTyping(){if(typingEl){typingEl.remove();typingEl=null;}}

  function actionCard(a, res){const d=document.createElement('div');d.className='act'+((res&&res.created)?' cal':'');
    let html=`<div class="t">${a.type}</div>`+
      `<div class="kv">urgency: <b>${a.urgency}</b></div>`+
      (a.needs_human?`<div class="kv human">⚑ needs human</div>`:``)+
      (a.details?`<div class="kv">details: <b>${a.details}</b></div>`:``)+
      (a.name?`<div class="kv">name: <b>${a.name}</b></div>`:``)+
      (a.datetime?`<div class="kv">datetime: <b>${a.datetime}</b></div>`:``)+
      (a.quote_total?`<div class="kv">quote: <b>${a.quote_total}</b></div>`:``);
    if(res&&res.created&&res.event){html+=`<div class="kv">📅 <b>calendar event created</b></div>`+
      `<div class="kv">${res.event.start.replace('T',' ')} → ${res.event.end.slice(11,16)}</div>`+
      `<a href="${res.google_calendar_url}" target="_blank">＋ Add to Google Calendar</a>`+
      `<div class="kv" style="margin-top:6px">.ics saved on server</div>`;}
    else if(res&&res.kind){html+=`<div class="kv">✓ saved to ${res.kind} store</div>`;}
    d.innerHTML=html;$('actions').prepend(d);}

  function speak(text){if(!$('speak').checked||!window.speechSynthesis)return;
    try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=1.02;u.pitch=1;
      const logo=document.querySelector('.logo');
      u.onstart=()=>logo&&logo.classList.add('speaking');
      u.onend=()=>logo&&logo.classList.remove('speaking');
      speechSynthesis.speak(u);}catch(e){}}

  async function send(){
    const v=$('msg').value.trim(); if(!v) return;
    const viaVoice=usedVoice; usedVoice=false;
    $('msg').value=''; $('send').disabled=true;
    bubble(v,'c'); history.push({role:'customer',content:v}); showTyping();
    try{
      const r=await fetch('/receptionist/chat',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({tenant_id:TENANT,message:v,channel:viaVoice?'voice':'chat',history})});
      const d=await r.json();
      hideTyping();
      if(!r.ok){bubble('⚠ '+(d.detail||('HTTP '+r.status)),'r');return;}
      bubble(d.reply_text,'r'); history.push({role:'receptionist',content:d.reply_text});
      actionCard(d.action, d.action_result);
      if(viaVoice||$('speak').checked) speak(d.reply_text);
      const u=d.usage; $('usage').textContent=`${viaVoice?'🎤 voice · ':''}model ${u.model} · ${u.tokens_in}+${u.tokens_out} tok · ${u.latency_ms}ms · $${(u.cost_usd||0).toFixed(5)}`;
    }catch(e){hideTyping();bubble('⚠ '+e.message,'r');}
    finally{$('send').disabled=false;$('msg').focus();}
  }
  $('send').onclick=send;
  $('msg').addEventListener('keydown',e=>{if(e.key==='Enter')send()});

  // ── Capability check (shown to the user so failures are visible) ──
  const secure = window.isSecureContext;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const TTS = 'speechSynthesis' in window;
  const caps = [];
  if(!secure) caps.push('⚠ open on http://localhost:8000 (mic needs a secure context — a LAN IP won\'t work)');
  if(!SR) caps.push('⚠ mic input needs Chrome/Edge/Safari (not Firefox)');
  if(!TTS) caps.push('⚠ spoken replies not supported in this browser');
  if(caps.length) $('usage').innerHTML = caps.join('<br>');

  const MIC_ERR = {'not-allowed':'mic permission blocked — allow it in the address bar 🔒','service-not-allowed':'mic blocked by the browser/OS','no-speech':'didn\'t hear anything — try again','audio-capture':'no microphone found','network':'speech network error — check connection'};

  if(SR){const rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;
    let listening=false;
    $('mic').onclick=()=>{
      if(!secure){$('usage').textContent='🎤 needs http://localhost:8000 (secure context)';return;}
      if(listening){rec.stop();return;}
      try{rec.start();}catch(e){$('usage').textContent='🎤 '+e.message;}
    };
    rec.onstart=()=>{listening=true;$('mic').classList.add('on');$('usage').textContent='🎤 listening…';};
    rec.onend=()=>{listening=false;$('mic').classList.remove('on');};
    rec.onresult=ev=>{const t=ev.results[0][0].transcript;$('msg').value=t;usedVoice=true;send();};
    rec.onerror=ev=>{listening=false;$('mic').classList.remove('on');$('usage').textContent='🎤 '+(MIC_ERR[ev.error]||('error: '+ev.error));};
  } else { $('mic').disabled=true; $('mic').title='Speech recognition not supported — use Chrome/Edge'; }

  // Pre-load TTS voices (some browsers populate them asynchronously).
  if(TTS){ try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }catch(e){} }
</script>
</body>
</html>
