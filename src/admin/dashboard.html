<script>
// State
var currentSection = (window.location.hash || '#overview').slice(1) || 'overview';
var leadsData = [];
var adAttrWindow = 30; // days; 0 = all-time
// Feedback filter state — kept across section reloads so refresh
// respects the user's current view.
var fbFilters = { source: 'all', rating: 'all', flow: 'all', resolved: 'all' };

// API helpers
function api(endpoint) {
  return fetch('/admin/api/' + endpoint).then(function(res) {
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  });
}

function showLoader() {
  document.getElementById('content').innerHTML = '<div class="flex items-center justify-center h-64"><div class="loader"></div></div>';
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function timeAgo(dateStr) {
  if (!dateStr) return 'Never';
  var diff = Date.now() - new Date(dateStr).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return Math.floor(days / 30) + 'mo ago';
}

function fmtDate(dateStr) {
  if (!dateStr) return '-';
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// Render the website-intake fields the user submitted (WhatsApp Flow form OR
// chat) from user.metadata.websiteData. The Flow path stores everything here
// (handleFlowCompletion → websiteData) but the admin never surfaced it, so a
// form submission looked empty. Formats the common fields and keeps a raw-JSON
// fallback so nothing the user entered is hidden.
function renderWebsiteIntake(wd) {
  if (!wd || typeof wd !== 'object') return '';
  function row(label, val) {
    if (val == null || val === '' || (Array.isArray(val) && val.length === 0)) return '';
    return '<p><b>' + esc(label) + ':</b> ' + esc(String(val)) + '</p>';
  }
  var parts = [];
  parts.push(row('Business', wd.businessName));
  parts.push(row('Industry', wd.industry || wd.industryKey));
  parts.push(row('Currency', wd.currency || wd.salonCurrency));
  parts.push(row('Email', wd.contactEmail));
  parts.push(row('Phone', wd.contactPhone));
  parts.push(row('Address', wd.contactAddress));
  parts.push(row('City', wd.primaryCity));
  if (Array.isArray(wd.serviceAreas) && wd.serviceAreas.length) parts.push(row('Service areas', wd.serviceAreas.join(', ')));

  // Services — salon stores structured rows (name/price/duration); other
  // niches store a plain string list.
  if (Array.isArray(wd.salonServices) && wd.salonServices.length) {
    var svc = wd.salonServices.map(function(s) {
      var bits = [s.name];
      if (s.priceText) bits.push(s.priceText);
      if (s.durationMinutes) bits.push(s.durationMinutes + ' min');
      return esc(bits.filter(Boolean).join(' — '));
    }).join('</li><li>');
    parts.push('<p><b>Services:</b></p><ul class="list-disc ml-5"><li>' + svc + '</li></ul>');
  } else if (Array.isArray(wd.services) && wd.services.length) {
    parts.push(row('Services', wd.services.join(', ')));
  }

  // Listings (real estate)
  if (Array.isArray(wd.listings) && wd.listings.length) {
    var lst = wd.listings.map(function(l) {
      var bits = [];
      if (l.address) bits.push(l.address);
      if (l.price) bits.push((l.currency ? l.currency + ' ' : '') + Number(l.price).toLocaleString());
      var bb = [];
      if (l.beds != null) bb.push(l.beds + 'bd');
      if (l.baths != null) bb.push(l.baths + 'ba');
      if (l.sqft) bb.push(Number(l.sqft).toLocaleString() + 'sf');
      if (bb.length) bits.push(bb.join('/'));
      if (l.status) bits.push(l.status);
      if (l.neighborhood) bits.push(l.neighborhood);
      return esc(bits.filter(Boolean).join(' — '));
    }).join('</li><li>');
    parts.push('<p><b>Listings:</b></p><ul class="list-disc ml-5"><li>' + lst + '</li></ul>');
  }

  // Agent profile (real estate)
  if (wd.brokerageName || wd.yearsExperience != null || (Array.isArray(wd.designations) && wd.designations.length) || wd.agentProfileRaw) {
    var ap = [];
    if (wd.brokerageName) ap.push(wd.brokerageName);
    if (wd.yearsExperience != null) ap.push(wd.yearsExperience + ' yrs');
    if (Array.isArray(wd.designations) && wd.designations.length) ap.push(wd.designations.join(', '));
    parts.push(row('Agent profile', ap.length ? ap.join(' · ') : wd.agentProfileRaw));
  }

  parts.push(row('About', wd.aboutText || wd.about));
  if (wd.bookingMode) {
    var bk = wd.bookingMode === 'native' ? 'Build into site'
      : (wd.bookingMode === 'embed' && wd.bookingUrl) ? ('Own tool — ' + wd.bookingUrl)
      : (wd.bookingMode === 'embed' || wd.bookingMode === 'embed_pending') ? 'Own tool'
      : wd.bookingMode;
    parts.push(row('Booking', bk));
  }
  parts.push(row('Listings (raw)', wd.listingsRaw));
  parts.push(row('Projects (raw)', wd.projectsRaw));
  // Logo uploaded via the Flow PhotoPicker (or chat) — show a thumbnail.
  if (wd.logoUrl) {
    parts.push('<p><b>Logo:</b><br><img src="' + esc(wd.logoUrl) + '" alt="logo" onclick="window.open(this.src)" style="max-height:48px;max-width:160px;margin-top:3px;background:#fff;border-radius:4px;padding:3px;border:1px solid #d1d5db;cursor:pointer"></p>');
  } else if (wd.logoSkipped) {
    parts.push(row('Logo', 'skipped'));
  }
  // Portfolio headshot ("A photo of you") — round thumbnail, click to enlarge.
  if (wd.aboutPhotoUrl) {
    parts.push('<p><b>Photo of them:</b><br><img src="' + esc(wd.aboutPhotoUrl) + '" alt="headshot" onclick="window.open(this.src)" style="height:96px;width:96px;object-fit:cover;border-radius:50%;margin-top:3px;border:1px solid #d1d5db;cursor:pointer"></p>');
  }
  // Work photos the client uploaded via the Flow — thumbnail strip, click any
  // to open full size. These are the processed Supabase URLs (the raw flow
  // answer only holds an encrypted, short-lived descriptor — not viewable).
  var workPhotos = Array.isArray(wd.projects) ? wd.projects.map(function(p){ return p && p.photoUrl; }).filter(Boolean) : [];
  if (workPhotos.length) {
    var thumbs = workPhotos.map(function(u){
      return '<img src="' + esc(u) + '" alt="work" onclick="window.open(this.src)" style="height:64px;width:64px;object-fit:cover;border-radius:4px;border:1px solid #d1d5db;cursor:pointer">';
    }).join('');
    parts.push('<p><b>Work photos (' + workPhotos.length + '):</b><br><span style="display:flex;flex-wrap:wrap;gap:4px;margin-top:3px">' + thumbs + '</span></p>');
  }

  var body = parts.filter(Boolean).join('');
  if (!body) return '';

  var badge = wd.flowSource ? ' <span class="badge bg-green-100 text-green-700">via WhatsApp form</span>' : '';
  return '<div class="bg-teal-50 rounded-lg p-3 mb-4 text-xs space-y-1">' +
    '<p class="font-semibold text-teal-800 mb-1">📋 Website intake' + badge + '</p>' +
    body +
    '<details class="mt-2"><summary class="cursor-pointer text-teal-700">Raw data</summary>' +
    '<pre class="whitespace-pre-wrap text-[10px] mt-1 text-gray-600">' + esc(JSON.stringify(wd, null, 2)) + '</pre></details>' +
    '</div>';
}

// Durable WhatsApp Flow form submission, straight from flow_sessions.answers
// (the raw fields the user typed, keyed by form name). Rendered inline at the
// "[Flow submitted]" bubble so a submission is never invisible — even after a
// /reset has cleared the derived websiteData. `theme` decides what f1/f2 mean.
function renderFlowSubmission(sub) {
  if (!sub || !sub.answers || typeof sub.answers !== 'object') return '';
  var a = sub.answers, theme = sub.theme || '';
  function row(label, val) {
    if (val == null || val === '' || (Array.isArray(val) && val.length === 0)) return '';
    return '<p><b>' + esc(label) + ':</b> ' + esc(String(val)) + '</p>';
  }
  var parts = [];
  parts.push(row('Business', a.business_name));
  parts.push(row('Email', a.email));
  parts.push(row('Industry', a.industry));
  parts.push(row('Currency', a.currency));
  if (a.booking) parts.push(row('Booking', a.booking === 'own' ? ('Own tool' + (a.booking_link ? ' — ' + a.booking_link : '')) : 'Build into site'));
  parts.push(row('Hours', a.hours));
  // Salon services — structured name/price/duration rows.
  if (Array.isArray(a.services_list) && a.services_list.length) {
    var svc = a.services_list.map(function(s) {
      var b = [s.name];
      if (s.price) b.push(s.price);
      if (s.duration) b.push(s.duration);
      return esc(b.filter(Boolean).join(' — '));
    }).join('</li><li>');
    parts.push('<p><b>Services:</b></p><ul class="list-disc ml-5"><li>' + svc + '</li></ul>');
  }
  // f1/f2 are free-text fields whose meaning depends on the niche.
  var f1Label = theme === 'hvac' ? 'City + areas' : theme === 'realestate' ? 'Agent profile' : theme === 'portfolio' ? 'Bio' : 'Services';
  var f2Label = theme === 'hvac' ? 'Services' : theme === 'realestate' ? 'Listings' : theme === 'portfolio' ? 'Projects' : 'More';
  parts.push(row(f1Label, a.f1));
  parts.push(row(f2Label, a.f2));
  // Contact — phone may carry a separate country code.
  var phone = a.c_phone ? (((a.c_code && String(a.c_phone).indexOf('+') !== 0) ? a.c_code + ' ' : '') + a.c_phone) : '';
  parts.push(row('Contact email', a.c_email));
  parts.push(row('Contact phone', phone));
  parts.push(row('Address', a.c_address));
  if (Array.isArray(a.logo_media) && a.logo_media.length) parts.push(row('Logo', 'uploaded ✓'));
  if (Array.isArray(a.about_photo_media) && a.about_photo_media.length) parts.push(row('Photo of them', 'uploaded ✓'));
  if (Array.isArray(a.portfolio_photos_media) && a.portfolio_photos_media.length) parts.push(row('Work photos', a.portfolio_photos_media.length + ' uploaded ✓'));

  var body = parts.filter(Boolean).join('');
  if (!body) return '';
  var when = sub.submitted_at ? ' · ' + fmtDate(sub.submitted_at) : '';
  return '<div class="bg-green-50 rounded-lg p-3 mb-4 text-xs space-y-1">' +
    '<p class="font-semibold text-green-800 mb-1">📝 Flow form submission' + esc(when) + '</p>' +
    body +
    '<details class="mt-2"><summary class="cursor-pointer text-green-700">Raw answers</summary>' +
    '<pre class="whitespace-pre-wrap text-[10px] mt-1 text-gray-600">' + esc(JSON.stringify(a, null, 2)) + '</pre></details>' +
    '</div>';
}

function stateBadge(state) {
  var colors = {
    WELCOME: 'bg-gray-100 text-gray-600',
    SERVICE_SELECTION: 'bg-blue-100 text-blue-700',
    SALES_CHAT: 'bg-purple-100 text-purple-700',
    GENERAL_CHAT: 'bg-gray-100 text-gray-600'
  };
  var prefixes = [
    ['SEO_', 'bg-amber-100 text-amber-700'],
    ['WEB_', 'bg-emerald-100 text-emerald-700'],
    ['APP_', 'bg-cyan-100 text-cyan-700'],
    ['MARKETING_', 'bg-pink-100 text-pink-700'],
    ['SCHEDULE_', 'bg-indigo-100 text-indigo-700']
  ];
  var color = colors[state] || 'bg-gray-100 text-gray-600';
  for (var i = 0; i < prefixes.length; i++) {
    if (state.indexOf(prefixes[i][0]) === 0) { color = prefixes[i][1]; break; }
  }
  return '<span class="badge ' + color + '">' + esc(state) + '</span>';
}

function leadStatusBadge(lead) {
  if (lead.is_closed) return '<span class="badge bg-green-100 text-green-700">Closed</span>';
  if (lead.is_qualified) return '<span class="badge bg-yellow-100 text-yellow-700">Qualified</span>';
  return '<span class="badge bg-gray-100 text-gray-500">Open</span>';
}

function tempBadge(temp) {
  if (!temp) return '';
  if (temp === 'HOT') return '<span class="badge bg-red-100 text-red-700">🔥 HOT</span>';
  if (temp === 'WARM') return '<span class="badge bg-orange-100 text-orange-700">⚡ WARM</span>';
  if (temp === 'COLD') return '<span class="badge bg-blue-100 text-blue-700">🧊 COLD</span>';
  return '';
}

// Sidebar (mobile off-canvas)
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
  document.getElementById('sidebar-backdrop').classList.toggle('hidden');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('sidebar-backdrop').classList.add('hidden');
}

// Navigation
document.querySelectorAll('.sidebar-link').forEach(function(link) {
  link.addEventListener('click', function(e) {
    e.preventDefault();
    var section = link.dataset.section;
    // Auto-close drawer on mobile, even when clicking the active item.
    closeSidebar();
    if (section === currentSection) return;
    document.querySelectorAll('.sidebar-link').forEach(function(l) { l.classList.remove('active'); });
    link.classList.add('active');
    currentSection = section;
    window.location.hash = section;
    loadSection(section);
  });
});

// On page load, activate the correct sidebar link and load the section from hash
(function() {
  var initLink = document.querySelector('.sidebar-link[data-section="' + currentSection + '"]');
  if (initLink) {
    document.querySelectorAll('.sidebar-link').forEach(function(l) { l.classList.remove('active'); });
    initLink.classList.add('active');
  }
  loadSection(currentSection);
})();

function loadSection(section) {
  showLoader();
  var promise;
  switch (section) {
    case 'overview': promise = Promise.all([api('overview'), api('message-volume')]).then(function(r) { renderOverview(r[0], r[1]); }); break;
    case 'salesprep': promise = api('sales-prep').then(renderSalesPrep); break;
    case 'leads': promise = api('leads').then(function(d) { leadsData = d; renderLeads(d); }); break;
    case 'conversations':
      promise = (leadsData.length ? Promise.resolve(leadsData) : api('leads')).then(function(d) { leadsData = d; renderConversations(d); });
      break;
    case 'dropoffs': promise = api('dropoffs').then(renderDropoffs); break;
    case 'funnel': promise = api('funnel').then(renderFunnel); break;
    case 'sites': promise = api('sites').then(renderSites); break;
    case 'audits': promise = api('audits').then(renderAudits); break;
    case 'meetings': promise = api('meetings').then(renderMeetings); break;
    case 'revenue': promise = Promise.all([api('revenue'), api('payments')]).then(function(r) { renderRevenue(r[0], r[1]); }); break;
    case 'payments': promise = api('payments').then(renderPayments); break;
    case 'adattribution':
      promise = api('ad-attribution?days=' + (adAttrWindow || 0)).then(function(d) { renderAdAttribution(d); });
      break;
    case 'leadsummaries': promise = api('lead-summaries').then(renderLeadSummaries); break;
    case 'domains': promise = api('domains').then(renderDomains); break;
    case 'feedback':
      promise = api('feedback?' + new URLSearchParams(fbFilters).toString()).then(renderFeedback);
      break;
    case 'settings': promise = api('settings').then(renderSettings); break;
  }
  promise.catch(function(err) {
    document.getElementById('content').innerHTML = '<div class="bg-red-50 text-red-700 rounded-xl p-6"><b>Error loading data:</b> ' + esc(err.message) + '</div>';
  });
}

// Destroy previous chart instances to prevent canvas reuse errors
var activeCharts = [];
function destroyCharts() {
  activeCharts.forEach(function(c) { c.destroy(); });
  activeCharts = [];
}

var chartDefaults = {
  font: { family: 'Inter' },
  color: '#6b7280',
  plugins: { legend: { labels: { font: { family: 'Inter', size: 12 }, padding: 16 } } }
};

function renderOverview(m, volume) {
  destroyCharts();

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<div class="flex items-center justify-between mb-8"><h2 class="text-2xl font-bold">Dashboard Overview</h2><button onclick="loadSection(\'overview\')" class="text-sm text-indigo-600 hover:text-indigo-800">Refresh</button></div>' +

    // Metric cards
    '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">' +
      metricCard('Total Leads', m.totalUsers, 'bg-indigo-500') +
      metricCard('Active Today', m.activeToday, 'bg-emerald-500') +
      metricCard('Qualified', m.qualified, 'bg-yellow-500', m.qualificationRate + '%') +
      metricCard('Closed', m.closed, 'bg-green-600', m.conversionRate + '%') +
    '</div>' +

    // Charts row 1: Message volume + Lead status
    '<div class="grid md:grid-cols-3 gap-6 mb-8">' +
      '<div class="md:col-span-2 bg-white rounded-xl border p-5">' +
        '<h3 class="font-semibold mb-4">Message Volume (7 days)</h3>' +
        '<div style="height:260px"><canvas id="chart-volume"></canvas></div>' +
      '</div>' +
      '<div class="bg-white rounded-xl border p-5">' +
        '<h3 class="font-semibold mb-4">Lead Status</h3>' +
        '<div style="height:260px" class="flex items-center justify-center"><canvas id="chart-lead-status"></canvas></div>' +
      '</div>' +
    '</div>' +

    // Charts row 2: Services breakdown + State distribution
    '<div class="grid md:grid-cols-2 gap-6 mb-8">' +
      '<div class="bg-white rounded-xl border p-5">' +
        '<h3 class="font-semibold mb-4">Services Overview</h3>' +
        '<div style="height:280px"><canvas id="chart-services"></canvas></div>' +
      '</div>' +
      '<div class="bg-white rounded-xl border p-5">' +
        '<h3 class="font-semibold mb-4">User State Distribution</h3>' +
        '<div style="height:280px"><canvas id="chart-states"></canvas></div>' +
      '</div>' +
    '</div>' +

    // Extra metrics row
    '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">' +
      metricCard('Active This Week', m.activeWeek, 'bg-blue-500') +
      metricCard('Messages (7d)', m.messagesWeek, 'bg-purple-500') +
      metricCard('Sites Generated', m.sites.total, 'bg-emerald-600') +
      metricCard('SEO Audits', m.audits.total, 'bg-amber-500') +
    '</div>' +

    // Lead temperature row
    ((m.hotLeads || m.warmLeads || m.coldLeads) ?
    '<div class="bg-white rounded-xl border p-5 mb-8">' +
      '<h3 class="font-semibold mb-4">Lead Temperature</h3>' +
      '<div class="grid grid-cols-3 gap-4">' +
        '<div class="flex items-center gap-3 p-3 bg-red-50 rounded-xl border border-red-100">' +
          '<span class="text-2xl font-bold text-red-600">' + (m.hotLeads || 0) + '</span>' +
          '<div><p class="font-semibold text-red-700 text-sm">🔥 HOT</p><p class="text-xs text-red-400">Ready to close</p></div>' +
        '</div>' +
        '<div class="flex items-center gap-3 p-3 bg-orange-50 rounded-xl border border-orange-100">' +
          '<span class="text-2xl font-bold text-orange-600">' + (m.warmLeads || 0) + '</span>' +
          '<div><p class="font-semibold text-orange-700 text-sm">⚡ WARM</p><p class="text-xs text-orange-400">Needs nurturing</p></div>' +
        '</div>' +

      scales: { y: { beginAtZero: true, ticks: { font: { family: 'Inter' } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { family: 'Inter', size: 11 } }, grid: { display: false } } },

        legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 12 }, usePointStyle: true, padding: 16 } }
      }

  activeCharts.push(new Chart(document.getElementById('chart-services'), {

        { label: 'Completed', data: [m.sites.approved, m.audits.completed, m.meetings.confirmed], backgroundColor: '#22c55e', borderRadius: 6 },

      scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { family: 'Inter' } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { family: 'Inter' } }, grid: { display: false } } },
      plugins: { legend: { labels: { font: { family: 'Inter', size: 12 }, usePointStyle: true, padding: 16 } } }
    }
  }));

  // ── Chart 4: State distribution horizontal bar ──

  var stateColors = stateEntries.map(function(e) {
    var s = e[0];
    if (s.indexOf('WEB_') === 0) return '#10b981';
    if (s.indexOf('SEO_') === 0) return '#f59e0b';
    if (s.indexOf('SALES') === 0) return '#8b5cf6';
    if (s.indexOf('APP_') === 0) return '#06b6d4';

  activeCharts.push(new Chart(document.getElementById('chart-states'), {
    type: 'bar',
    data: {
      labels: stateEntries.map(function(e) { return e[0]; }),

    },

      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      scales: { x: { beginAtZero: true, ticks: { stepSize: 1, font: { family: 'Inter' } }, grid: { color: '#f3f4f6' } }, y: { ticks: { font: { family: 'Inter', size: 11 } }, grid: { display: false } } },
      plugins: { legend: { display: false } }
    }
  }));
}

  stateOptions.sort();

  var filters = '<div class="flex flex-wrap gap-3 mb-4">' +
    '<input id="lead-search" type="text" placeholder="Search phone or name..." class="px-3 py-2 border rounded-lg text-sm w-full sm:w-64" oninput="filterLeads()">' +
    '<select id="lead-status" class="px-3 py-2 border rounded-lg text-sm" onchange="filterLeads()">' +
      '<option value="">All Status</option><option value="closed">Closed</option><option value="qualified">Qualified</option><option value="open">Open</option>' +
    '</select>' +
    '<select id="lead-temp" class="px-3 py-2 border rounded-lg text-sm" onchange="filterLeads()">' +
      '<option value="">All Temps</option><option value="HOT">🔥 HOT</option><option value="WARM">⚡ WARM</option><option value="COLD">🧊 COLD</option>' +
    '</select>' +
    '<select id="lead-state" class="px-3 py-2 border rounded-lg text-sm" onchange="filterLeads()">' +
      '<option value="">All States</option>' +
      stateOptions.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('') +
    '</select>' +
  '</div>';

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<div class="flex items-center justify-between mb-6"><h2 class="text-2xl font-bold">Leads (' + leads.length + ')</h2></div>' +
    filters +
    '<div class="bg-white rounded-xl border overflow-hidden"><div class="overflow-x-auto">' +
    '<table class="w-full text-sm">' +
      '<thead class="bg-gray-50 border-b"><tr>' +
        '<th class="text-left p-3 font-semibold">Phone</th>' +
        '<th class="text-left p-3 font-semibold">Name</th>' +
        '<th class="text-left p-3 font-semibold">State</th>' +
        '<th class="text-left p-3 font-semibold">Status</th>' +
        '<th class="text-left p-3 font-semibold">Temp</th>' +
        '<th class="text-left p-3 font-semibold">Messages</th>' +
        '<th class="text-left p-3 font-semibold">Services</th>' +
        '<th class="text-left p-3 font-semibold">Last Active</th>' +
        '<th class="text-left p-3 font-semibold">Actions</th>' +
      '</tr></thead>' +
      '<tbody id="leads-tbody">' + leadsTableRows(leads) + '</tbody>' +
    '</table></div></div>' +
  '</div>';
}

function filterLeads() {
  var search = document.getElementById('lead-search').value.toLowerCase();
  var status = document.getElementById('lead-status').value;
  var temp = document.getElementById('lead-temp').value;
  var state = document.getElementById('lead-state').value;
  var filtered = leadsData.filter(function(l) {
    if (search && l.phone_number.toLowerCase().indexOf(search) === -1 && (l.name || '').toLowerCase().indexOf(search) === -1) return false;
    if (status === 'closed' && !l.is_closed) return false;
    if (status === 'qualified' && (!l.is_qualified || l.is_closed)) return false;
    if (status === 'open' && (l.is_qualified || l.is_closed)) return false;
    if (temp && l.lead_temperature !== temp) return false;
    if (state && l.state !== state) return false;
    return true;
  });
  document.getElementById('leads-tbody').innerHTML = leadsTableRows(filtered);
}

// ─── Conversations ─────────────────────────────
var convChannelFilter = 'all';
var convTypeFilter = 'all'; // 'all' | 'ai' | 'manual'
var convShowFavoritesOnly = false;
var convStatusFilter = 'all'; // 'all' | 'paid' | 'qualified' | 'closed'
var convTemperatureFilter = 'all'; // 'all' | 'hot' | 'warm' | 'cold'
var convServiceFilter = 'all'; // 'all' | 'website' | 'seo' | 'logo' | 'ad' | 'chatbot'
var convRecencyFilter = 'all'; // 'all' | 'today' | '7d' | '30d'
var selectedConvIds = new Set(); // checked rows for bulk CSV export

function matchesStatusFilter(l, key) {
  if (key === 'all') return true;
  if (key === 'paid') return !!l.is_paid;
  if (key === 'qualified') return !!l.is_qualified;
  if (key === 'closed') return !!l.is_closed;
  return true;
}
function matchesTemperatureFilter(l, key) {
  if (key === 'all') return true;
  return (l.lead_temperature || '').toLowerCase() === key;
}
function matchesServiceFilter(l, key) {
  if (key === 'all') return true;
  return !!(l.services_used && l.services_used[key]);
}
function matchesRecencyFilter(l, key) {
  if (key === 'all') return true;
  var t = l.last_message_at ? new Date(l.last_message_at).getTime() : 0;
  if (!t) return false;
  var diff = Date.now() - t;
  if (key === 'today') return diff < 24 * 60 * 60 * 1000;
  if (key === '7d') return diff < 7 * 24 * 60 * 60 * 1000;
  if (key === '30d') return diff < 30 * 24 * 60 * 60 * 1000;
  return true;
}

// ─── Favorites (server-backed via users.metadata.adminFavorite) ──
function isFavorite(userId) {
  var l = (leadsData || []).find(function(x) { return x.id === userId; });
  return !!(l && l.is_favorite);
}
function toggleFavorite(userId, ev) {
  ev && ev.stopPropagation();
  var lead = (leadsData || []).find(function(x) { return x.id === userId; });
  if (!lead) return;
  var next = !lead.is_favorite;
  lead.is_favorite = next; // optimistic
  // Update the star on the current row without full re-render
  var btn = document.getElementById('fav-btn-' + userId);
  if (btn) btn.innerHTML = next ? '&#9733;' : '&#9734;';
  if (btn) btn.title = next ? 'Remove from favourites' : 'Add to favourites';
  if (btn) btn.style.color = next ? '#f59e0b' : '#9ca3af';
  // Also update the star in the open modal header if this is the open convo
  if (currentConvUserId === userId) {
    var mBtn = document.getElementById('modal-fav-btn');
    if (mBtn) { mBtn.innerHTML = next ? '&#9733;' : '&#9734;'; mBtn.style.color = next ? '#f59e0b' : '#6b7280'; }
  }
  fetch('/admin/api/conversations/' + userId + '/favorite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ favorite: next }),
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
  }).catch(function() {
    // Revert optimistic flip and re-render so the UI matches truth
    lead.is_favorite = !next;
    renderConversations(leadsData);
    alert('Could not save favourite — try again.');
  });
  // If we're in favorites-only mode and just un-favourited, re-render
  if (convShowFavoritesOnly) renderConversations(leadsData);
}

function channelIcon(channel) {
  if (channel === 'messenger') return '<span class="inline-block w-5 h-5 rounded-full bg-blue-100 text-blue-600 text-[10px] font-bold flex items-center justify-center" title="Messenger">M</span>';
  if (channel === 'instagram') return '<span class="inline-block w-5 h-5 rounded-full bg-pink-100 text-pink-600 text-[10px] font-bold flex items-center justify-center" title="Instagram">IG</span>';
  return '<span class="inline-block w-5 h-5 rounded-full bg-green-100 text-green-600 text-[10px] font-bold flex items-center justify-center" title="WhatsApp">WA</span>';
}
// Small pill showing which of OUR WhatsApp numbers the user is messaging.
// Only shown when via_phone_number_id is set, so legacy rows render nothing.
function viaLinePill(via) {
  if (!via) return '';
  var last4 = String(via).slice(-4);
  return '<span class="inline-block px-1.5 py-0.5 rounded-sm bg-gray-100 text-gray-600 text-[10px] font-mono" title="Received on our line ending ' + last4 + ' (phone_number_id: ' + via + ')">via …' + last4 + '</span>';
}

// Small badge showing the detected inbound language for a conversation.
// Only renders when the language has been cached (via the
// detect-language endpoint, which auto-fires on modal open). English
// rows show nothing — admin doesn't need a badge for the default. The
// pill is amber to stand out from the WA / via-line / takeover pills
// without competing with them visually.
function languageBadge(detected) {
  if (!detected || !detected.name) return '';
  // Suppress noise: English is default for the bot, no point flagging.
  if (/^english$/i.test(detected.name)) return '';
  var label = esc(detected.name);
  return '<span class="inline-block px-1.5 py-0.5 rounded-sm bg-amber-50 text-amber-700 text-[10px] font-medium border border-amber-200" title="Detected user language">🌐 ' + label + '</span>';
}

function convListItems(leads) {
  return leads.filter(function(l) {
    if (l.message_count === 0) return false;
    if (convChannelFilter !== 'all' && (l.channel || 'whatsapp') !== convChannelFilter) return false;
    if (convTypeFilter === 'manual' && !l.has_manual) return false;
    if (convTypeFilter === 'ai' && l.has_manual) return false;
    if (convShowFavoritesOnly && !isFavorite(l.id)) return false;
    if (!matchesStatusFilter(l, convStatusFilter)) return false;
    if (!matchesTemperatureFilter(l, convTemperatureFilter)) return false;
    if (!matchesServiceFilter(l, convServiceFilter)) return false;
    if (!matchesRecencyFilter(l, convRecencyFilter)) return false;
    return true;
  }).sort(function(a, b) {
    var ta = a.last_message_at ? new Date(a.last_message_at).getTime() : 0;
    var tb = b.last_message_at ? new Date(b.last_message_at).getTime() : 0;
    return tb - ta;
  }).map(function(l) {
    // Strong amber tint + thick left-border accent for conversations with at
    // least one manual (operator-sent) reply. Also adds a clear "Manual"
    // badge so the row is unmistakable in a long list.
    var rowClasses = l.has_manual
      ? 'bg-amber-100 border-amber-300 border-l-[6px] border-l-amber-500 hover:border-amber-500 ring-1 ring-amber-200'
      : 'bg-white border hover:border-indigo-300';
    // Two flavours of "manual": currently in human-takeover mode, and/or
    // operator has sent at least one reply. Show both badges if both apply.
    var badges = '';
    if (l.is_tester) {
      badges += '<span class="inline-flex items-center gap-1 ml-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-gray-200 text-gray-700" title="This number is in TESTER_PHONES — feedback signals are suppressed">🧪 TESTER</span>';
    }
    if (l.human_takeover) {
      badges += '<span class="inline-flex items-center gap-1 ml-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-red-500 text-white shadow-sm" title="Human takeover is active — AI is paused for this conversation">🙋 TAKEOVER</span>';
    }
    if (l.manual_count > 0) {
      badges += '<span class="inline-flex items-center gap-1 ml-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-500 text-white shadow-sm" title="' + l.manual_count + ' manual repl' + (l.manual_count === 1 ? 'y' : 'ies') + ' sent">✋ MANUAL' + (l.manual_count > 1 ? ' ×' + l.manual_count : '') + '</span>';
    }
    var manualBadge = badges;
    // WhatsApp-only 24h-window indicator. A green dot = the user messaged
    // within the last 24 hours so free-form replies will go through. A
    // red dot = window closed, we can only send an approved template.
    // Messenger/Instagram don't have this 24h rule, so we skip the dot
    // for non-WhatsApp channels.
    var windowDot = '';
    if ((l.channel || 'whatsapp') === 'whatsapp') {
      if (l.within_24h) {
        windowDot = '<span class="inline-block w-2 h-2 rounded-full bg-green-500" title="24h window OPEN — you can send free-form replies"></span>';
      } else if (l.last_inbound_at) {
        windowDot = '<span class="inline-block w-2 h-2 rounded-full bg-red-500" title="24h window CLOSED (' + (l.hours_since_inbound || 0) + 'h since last inbound) — reply requires an approved template"></span>';
      } else {
        windowDot = '<span class="inline-block w-2 h-2 rounded-full bg-gray-300" title="No inbound yet from this user"></span>';
      }
    }
    var favColor = isFavorite(l.id) ? '#f59e0b' : '#9ca3af';
    var favTitle = isFavorite(l.id) ? 'Remove from favourites' : 'Add to favourites';
    var favStar = isFavorite(l.id) ? '&#9733;' : '&#9734;';
    var isChecked = selectedConvIds.has(l.id);
    return '<div class="rounded-xl ' + rowClasses + ' p-4 flex items-center justify-between transition-colors cursor-pointer' + (isChecked ? ' ring-2 ring-indigo-400' : '') + '" onclick="openConversation(\'' + l.id + '\', \'' + esc(l.phone_number) + '\', \'' + esc(l.name || '') + '\')">' +
      '<div class="flex items-center gap-3">' +
        '<input type="checkbox" id="chk-' + l.id + '" ' + (isChecked ? 'checked' : '') + ' onclick="toggleConvSelect(\'' + l.id + '\', event)" class="w-4 h-4 rounded border-gray-300 text-indigo-600 cursor-pointer shrink-0" style="accent-color:#4f46e5">' +
        '<div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm shrink-0">' + (l.name ? l.name[0].toUpperCase() : '#') + '</div>' +
        '<div>' +
          '<p class="font-semibold text-sm flex items-center gap-2 flex-wrap">' + windowDot + ' ' + esc(l.name || l.phone_number) + ' ' + channelIcon(l.channel || 'whatsapp') + ' ' + viaLinePill(l.via_phone_number_id) + manualBadge + languageBadge(l.detected_language) + '</p>' +
          '<p class="text-xs text-gray-500">' + esc(l.phone_number) + ' &middot; ' + l.message_count + ' messages</p>' +
        '</div>' +
      '</div>' +
      '<div class="flex items-center gap-3">' +
        '<button id="fav-btn-' + l.id + '" onclick="toggleFavorite(\'' + l.id + '\', event)" title="' + favTitle + '" style="color:' + favColor + ';font-size:1.25rem;line-height:1;background:none;border:none;cursor:pointer;padding:4px 2px;" aria-label="Favourite">' + favStar + '</button>' +
        '<div class="text-right">' +
          stateBadge(l.state) +
          '<p class="text-xs text-gray-400 mt-1">' + timeAgo(l.last_message_at) + '</p>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function convChannelCounts(leads) {
  var active = leads.filter(function(l) { return l.message_count > 0; });
  var wa = active.filter(function(l) { return (l.channel || 'whatsapp') === 'whatsapp'; }).length;
  var msg = active.filter(function(l) { return (l.channel || 'whatsapp') === 'messenger'; }).length;
  var ig = active.filter(function(l) { return (l.channel || 'whatsapp') === 'instagram'; }).length;
  return { all: active.length, whatsapp: wa, messenger: msg, instagram: ig };
}

// Counts split across "AI only" vs "any manual reply" — respects the active
// channel filter so the numbers in the type tabs match what's visible.
function convTypeCounts(leads) {
  var visible = leads.filter(function(l) {
    if (l.message_count === 0) return false;
    if (convChannelFilter !== 'all' && (l.channel || 'whatsapp') !== convChannelFilter) return false;
    return true;
  });
  var manual = visible.filter(function(l) { return l.has_manual; }).length;
  return { all: visible.length, ai: visible.length - manual, manual: manual };
}

// Counts for the status/temperature/service/recency filter rows. Each row
// ignores its own selection but respects every other active filter, so the
// number on each pill is "how many you'd see if you picked this".
function convExtraCounts(leads) {
  var base = leads.filter(function(l) {
    if (l.message_count === 0) return false;
    if (convChannelFilter !== 'all' && (l.channel || 'whatsapp') !== convChannelFilter) return false;
    if (convTypeFilter === 'manual' && !l.has_manual) return false;
    if (convTypeFilter === 'ai' && l.has_manual) return false;
    if (convShowFavoritesOnly && !isFavorite(l.id)) return false;
    return true;
  });
  function countFor(ignoreKey, predicate) {
    return base.filter(function(l) {
      if (ignoreKey !== 'status' && !matchesStatusFilter(l, convStatusFilter)) return false;
      if (ignoreKey !== 'temperature' && !matchesTemperatureFilter(l, convTemperatureFilter)) return false;
      if (ignoreKey !== 'service' && !matchesServiceFilter(l, convServiceFilter)) return false;
      if (ignoreKey !== 'recency' && !matchesRecencyFilter(l, convRecencyFilter)) return false;
      return predicate(l);
    }).length;
  }
  var TRUE = function() { return true; };
  return {
    status: {
      all: countFor('status', TRUE),
      paid: countFor('status', function(l) { return matchesStatusFilter(l, 'paid'); }),
      qualified: countFor('status', function(l) { return matchesStatusFilter(l, 'qualified'); }),
      closed: countFor('status', function(l) { return matchesStatusFilter(l, 'closed'); }),
    },
    temperature: {
      all: countFor('temperature', TRUE),
      hot: countFor('temperature', function(l) { return matchesTemperatureFilter(l, 'hot'); }),
      warm: countFor('temperature', function(l) { return matchesTemperatureFilter(l, 'warm'); }),
      cold: countFor('temperature', function(l) { return matchesTemperatureFilter(l, 'cold'); }),
    },
    service: {
      all: countFor('service', TRUE),
      website: countFor('service', function(l) { return matchesServiceFilter(l, 'website'); }),
      seo: countFor('service', function(l) { return matchesServiceFilter(l, 'seo'); }),
      logo: countFor('service', function(l) { return matchesServiceFilter(l, 'logo'); }),
      ad: countFor('service', function(l) { return matchesServiceFilter(l, 'ad'); }),
      chatbot: countFor('service', function(l) { return matchesServiceFilter(l, 'chatbot'); }),
    },
    recency: {
      all: countFor('recency', TRUE),
      today: countFor('recency', function(l) { return matchesRecencyFilter(l, 'today'); }),
      '7d': countFor('recency', function(l) { return matchesRecencyFilter(l, '7d'); }),
      '30d': countFor('recency', function(l) { return matchesRecencyFilter(l, '30d'); }),
    },
  };
}

function convPillClass(active, activeColor) {
  if (!active) return 'px-3 py-1.5 text-xs font-semibold rounded-md bg-white text-gray-600 border hover:bg-gray-50';
  return 'px-3 py-1.5 text-xs font-semibold rounded-md ' + activeColor + ' text-white shadow-sm';
}

      '<button onclick="setConvChannel(\'instagram\')" class="' + tabClass('instagram') + '">Instagram <span class="ml-1 text-xs opacity-75">(' + counts.instagram + ')</span></button>' +
    '</div>' +
    '<div class="flex items-center gap-2 mb-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 mr-1">Filter by type:</span>' +
      '<button onclick="setConvType(\'all\')" class="' + typeTabClass('all') + '">All <span class="ml-1 opacity-75">(' + tCounts.all + ')</span></button>' +
      '<button onclick="setConvType(\'ai\')" class="' + typeTabClass('ai') + '">🤖 AI Only <span class="ml-1 opacity-75">(' + tCounts.ai + ')</span></button>' +
      '<button onclick="setConvType(\'manual\')" class="' + typeTabClass('manual') + '">✋ Manual <span class="ml-1 opacity-75">(' + tCounts.manual + ')</span></button>' +
      '<button onclick="toggleFavoritesFilter()" class="' + (convShowFavoritesOnly ? 'px-3 py-1.5 text-xs font-semibold rounded-md bg-amber-400 text-white shadow-sm' : 'px-3 py-1.5 text-xs font-semibold rounded-md bg-white text-gray-600 border hover:bg-gray-50') + '">&#9733; Favourites</button>' +
    '</div>' +
    '<div class="flex items-center gap-2 mb-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 mr-1">Lead status:</span>' +
      '<button onclick="setConvStatus(\'all\')" class="' + convPillClass(convStatusFilter === 'all', 'bg-gray-700') + '">All <span class="ml-1 opacity-75">(' + xCounts.status.all + ')</span></button>' +
      '<button onclick="setConvStatus(\'paid\')" class="' + convPillClass(convStatusFilter === 'paid', 'bg-emerald-500') + '">💰 Paid <span class="ml-1 opacity-75">(' + xCounts.status.paid + ')</span></button>' +
      '<button onclick="setConvStatus(\'qualified\')" class="' + convPillClass(convStatusFilter === 'qualified', 'bg-indigo-500') + '">✅ Qualified <span class="ml-1 opacity-75">(' + xCounts.status.qualified + ')</span></button>' +
      '<button onclick="setConvStatus(\'closed\')" class="' + convPillClass(convStatusFilter === 'closed', 'bg-gray-500') + '">🔒 Closed <span class="ml-1 opacity-75">(' + xCounts.status.closed + ')</span></button>' +
    '</div>' +
    '<div class="flex items-center gap-2 mb-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 mr-1">Temperature:</span>' +
      '<button onclick="setConvTemperature(\'all\')" class="' + convPillClass(convTemperatureFilter === 'all', 'bg-gray-700') + '">All <span class="ml-1 opacity-75">(' + xCounts.temperature.all + ')</span></button>' +
      '<button onclick="setConvTemperature(\'hot\')" class="' + convPillClass(convTemperatureFilter === 'hot', 'bg-red-500') + '">🔥 Hot <span class="ml-1 opacity-75">(' + xCounts.temperature.hot + ')</span></button>' +
      '<button onclick="setConvTemperature(\'warm\')" class="' + convPillClass(convTemperatureFilter === 'warm', 'bg-orange-500') + '">☀️ Warm <span class="ml-1 opacity-75">(' + xCounts.temperature.warm + ')</span></button>' +
      '<button onclick="setConvTemperature(\'cold\')" class="' + convPillClass(convTemperatureFilter === 'cold', 'bg-sky-500') + '">❄️ Cold <span class="ml-1 opacity-75">(' + xCounts.temperature.cold + ')</span></button>' +
    '</div>' +
    '<div class="flex items-center gap-2 mb-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 mr-1">Service:</span>' +
      '<button onclick="setConvService(\'all\')" class="' + convPillClass(convServiceFilter === 'all', 'bg-gray-700') + '">All <span class="ml-1 opacity-75">(' + xCounts.service.all + ')</span></button>' +
      '<button onclick="setConvService(\'website\')" class="' + convPillClass(convServiceFilter === 'website', 'bg-indigo-500') + '">🌐 Website <span class="ml-1 opacity-75">(' + xCounts.service.website + ')</span></button>' +
      '<button onclick="setConvService(\'seo\')" class="' + convPillClass(convServiceFilter === 'seo', 'bg-indigo-500') + '">📊 SEO <span class="ml-1 opacity-75">(' + xCounts.service.seo + ')</span></button>' +
      '<button onclick="setConvService(\'logo\')" class="' + convPillClass(convServiceFilter === 'logo', 'bg-indigo-500') + '">🎨 Logo <span class="ml-1 opacity-75">(' + xCounts.service.logo + ')</span></button>' +
      '<button onclick="setConvService(\'ad\')" class="' + convPillClass(convServiceFilter === 'ad', 'bg-indigo-500') + '">📣 Ad <span class="ml-1 opacity-75">(' + xCounts.service.ad + ')</span></button>' +
      '<button onclick="setConvService(\'chatbot\')" class="' + convPillClass(convServiceFilter === 'chatbot', 'bg-indigo-500') + '">🤖 Chatbot <span class="ml-1 opacity-75">(' + xCounts.service.chatbot + ')</span></button>' +
    '</div>' +
    '<div class="flex items-center gap-2 mb-4 flex-wrap">' +
      '<span class="text-xs text-gray-500 mr-1">Recency:</span>' +

      '<button onclick="setConvRecency(\'7d\')" class="' + convPillClass(convRecencyFilter === '7d', 'bg-teal-500') + '">7 days <span class="ml-1 opacity-75">(' + xCounts.recency['7d'] + ')</span></button>' +
      '<button onclick="setConvRecency(\'30d\')" class="' + convPillClass(convRecencyFilter === '30d', 'bg-teal-500') + '">30 days <span class="ml-1 opacity-75">(' + xCounts.recency['30d'] + ')</span></button>' +
    '</div>' +
    '<div class="flex items-center gap-2 mb-3 flex-wrap">' +
      '<input id="conv-search" type="text" placeholder="Search by phone or name..." class="px-3 py-2 border rounded-lg text-sm w-full sm:w-64" oninput="filterConvList()">' +

      '<button onclick="downloadConvsCSV(\'visible\')" class="px-3 py-2 text-xs font-medium rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-600" title="Export all currently visible conversations">&#8681; Export All CSV</button>' +
      '<button onclick="downloadAllChatsTxt()" class="px-3 py-2 text-xs font-medium rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-600" title="Download full transcripts of ALL chats as one TXT file">&#8681; Download All Chats (TXT)</button>' +
      '<span id="conv-selected-bar" class="' + (selectedConvIds.size > 0 ? 'flex' : 'hidden') + ' items-center gap-2">' +
        '<span class="text-xs text-indigo-700 font-semibold">' + selectedConvIds.size + ' selected</span>' +
        '<button onclick="downloadConvsCSV(\'selected\')" class="px-3 py-2 text-xs font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">&#8681; Export Selected CSV</button>' +
        '<button onclick="downloadSelectedChatsTxt()" class="px-3 py-2 text-xs font-medium rounded-lg bg-emerald-600 text-white hover:bg-emerald-700">&#8681; Export Chats (TXT)</button>' +
        '<button onclick="clearConvSelection()" class="px-2 py-2 text-xs text-gray-400 hover:text-gray-600" title="Clear selection">&#10005;</button>' +
      '</span>' +
    '</div>' +
    '<div id="conv-list" class="grid gap-3">' + convListItems(leads) + '</div>' +
  '</div>';
}

// ─── Conversation multi-select ─────────────────
function toggleConvSelect(userId, ev) {
  ev && ev.stopPropagation();
  if (selectedConvIds.has(userId)) selectedConvIds.delete(userId);
  else selectedConvIds.add(userId);
  // Update ring on the row without full re-render
  var row = ev && ev.target && ev.target.closest('.rounded-xl');
  if (row) {
    if (selectedConvIds.has(userId)) row.classList.add('ring-2', 'ring-indigo-400');
    else row.classList.remove('ring-2', 'ring-indigo-400');
  }
  updateConvSelectionBar();
}

function updateConvSelectionBar() {
  var bar = document.getElementById('conv-selected-bar');
  if (!bar) return;
  if (selectedConvIds.size > 0) {
    bar.classList.remove('hidden');
    bar.classList.add('flex');
    var label = bar.querySelector('span');
    if (label) label.textContent = selectedConvIds.size + ' selected';
  } else {
    bar.classList.add('hidden');
    bar.classList.remove('flex');
  }
}

function clearConvSelection() {
  selectedConvIds.clear();
  // Uncheck all visible checkboxes
  document.querySelectorAll('[id^="chk-"]').forEach(function(cb) { cb.checked = false; });
  document.querySelectorAll('#conv-list .ring-2').forEach(function(el) { el.classList.remove('ring-2', 'ring-indigo-400'); });
  updateConvSelectionBar();
}

function toggleSelectAllConvs() {
  // Gather all currently visible lead ids from rendered checkboxes
  var boxes = document.querySelectorAll('[id^="chk-"]');
  var allChecked = boxes.length > 0 && Array.from(boxes).every(function(cb) { return cb.checked; });
  boxes.forEach(function(cb) {
    var uid = cb.id.replace('chk-', '');
    if (allChecked) {
      selectedConvIds.delete(uid);
      cb.checked = false;
      var row = cb.closest('.rounded-xl');
      if (row) row.classList.remove('ring-2', 'ring-indigo-400');
    } else {
      selectedConvIds.add(uid);
      cb.checked = true;
      var row = cb.closest('.rounded-xl');
      if (row) row.classList.add('ring-2', 'ring-indigo-400');
    }
  });
  updateConvSelectionBar();
}

// mode: 'selected' | 'visible' | 'favourites'
function downloadConvsCSV(mode) {
  var target;
  if (mode === 'selected') {
    target = (leadsData || []).filter(function(l) { return selectedConvIds.has(l.id); });
    if (!target.length) { alert('No conversations selected.'); return; }
  } else if (mode === 'favourites') {
    target = (leadsData || []).filter(function(l) { return isFavorite(l.id); });
    if (!target.length) { alert('No favourited contacts to export.'); return; }
  } else {
    // 'visible' — respects current channel/type/search/favourites filters
    var searchVal = (document.getElementById('conv-search') || {}).value || '';
    var s = searchVal.toLowerCase();
    target = (leadsData || []).filter(function(l) {
      if (l.message_count === 0) return false;
      if (convChannelFilter !== 'all' && (l.channel || 'whatsapp') !== convChannelFilter) return false;
      if (convTypeFilter === 'manual' && !l.has_manual) return false;
      if (convTypeFilter === 'ai' && l.has_manual) return false;
      if (convShowFavoritesOnly && !isFavorite(l.id)) return false;
      if (s) return l.phone_number.toLowerCase().indexOf(s) !== -1 || (l.name || '').toLowerCase().indexOf(s) !== -1;
      return true;
    });
    if (!target.length) { alert('No conversations match the current filters.'); return; }
  }

  function csvCell(v) {
    var s = v == null ? '' : String(v);
    if (s.indexOf(',') !== -1 || s.indexOf('\n') !== -1 || s.indexOf('"') !== -1) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  var headers = ['Name', 'Phone', 'Channel', 'State', 'Lead Temperature', 'Favourite', 'Services Interested', 'Ad Source', 'Joined', 'Last Activity', 'Summary'];
  var rows = [headers.map(csvCell).join(',')];
  target.forEach(function(l) {
    var services = [];
    if (l.services_used) {
      if (l.services_used.website) services.push('Website');
      if (l.services_used.seo) services.push('SEO');
      if (l.services_used.returnToSales) services.push('Return/Sales');
    }
    rows.push([
      l.name || '',
      l.phone_number || '',
      l.channel || 'whatsapp',
      l.state || '',
      l.lead_temperature || '',
      isFavorite(l.id) ? 'Yes' : '',
      services.join('; '),
      l.ad_source || '',
      l.created_at ? new Date(l.created_at).toLocaleDateString() : '',
      l.last_message_at ? new Date(l.last_message_at).toLocaleDateString() : '',
      l.lead_brief || '',
    ].map(csvCell).join(','));
  });

  var suffix = mode === 'selected' ? 'selected' : mode === 'favourites' ? 'favourites' : 'all';
  var blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'pixie_convs_' + suffix + '_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
}

function downloadFavouritesCSV() { downloadConvsCSV('favourites'); }

function downloadAllChatsTxt() {
  var btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Preparing…'; }
  window.location.href = '/admin/api/conversations/bulk-export';
  setTimeout(function() {
    if (btn) { btn.disabled = false; btn.textContent = '↙ Download All Chats (TXT)'; }
  }, 3000);
}

function downloadSelectedChatsTxt() {
  var ids = Array.from(selectedConvIds);
  if (!ids.length) { alert('No conversations selected.'); return; }
  var btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Preparing…'; }
  fetch('/admin/api/conversations/bulk-export-selected', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userIds: ids })
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || r.status); });
    return r.blob();
  }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'pixie_selected_chats_' + new Date().toISOString().slice(0, 10) + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  }).catch(function(err) {
    alert('Export failed: ' + err.message);
  }).finally(function() {
    if (btn) { btn.disabled = false; btn.textContent = '↙ Export Chats (TXT)'; }
  });
}

function filterConvList() {
  var s = document.getElementById('conv-search').value.toLowerCase();
  var filtered = leadsData.filter(function(l) {
    if (l.message_count === 0) return false;
    if (convChannelFilter !== 'all' && (l.channel || 'whatsapp') !== convChannelFilter) return false;
    if (convTypeFilter === 'manual' && !l.has_manual) return false;
    if (convTypeFilter === 'ai' && l.has_manual) return false;
    if (convShowFavoritesOnly && !isFavorite(l.id)) return false;
    if (!matchesStatusFilter(l, convStatusFilter)) return false;
    if (!matchesTemperatureFilter(l, convTemperatureFilter)) return false;
    if (!matchesServiceFilter(l, convServiceFilter)) return false;
    if (!matchesRecencyFilter(l, convRecencyFilter)) return false;
    return l.phone_number.toLowerCase().indexOf(s) !== -1 || (l.name || '').toLowerCase().indexOf(s) !== -1;
  });
  document.getElementById('conv-list').innerHTML = convListItems(filtered);
