// ─── Conversation Modal ────────────────────────
var currentConvUserId = null;
var currentConvPhone = null;
var convPollInterval = null;
var lastMsgCount = 0;
var lastConvMessages = []; // cached messages for the open modal — used to re-render on translate toggle
// Per-user translation cache. Key: userId. Value: { byId: { msgId: 'translated text' }, on: bool }
var translationsByConv = {};

function renderMessageContent(m, useTranslated) {
  var html = '';
  if (m.message_type === 'deleted') {
    html += '<span class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-red-50 text-red-400 text-xs italic mb-1.5">🗑 This message was deleted by the user</span>';
    return html;
  }
  var docLinkRendered = false;
  if (m.media_data && m.media_mime) {
    if (m.media_mime.indexOf('image') === 0) {
      var isSticker = m.media_mime === 'image/webp' && m.message_type === 'sticker';
      var imgClass = isSticker
        ? 'max-w-[120px] max-h-[120px] mb-1.5 cursor-pointer'
        : 'rounded-lg max-w-full max-h-64 mb-1.5 cursor-pointer';
      html += '<img src="' + m.media_data + '" alt="' + (isSticker ? 'sticker' : 'image') + '" class="' + imgClass + '" onclick="window.open(this.src)">';
    } else if (m.media_mime.indexOf('audio') === 0) {
      html += '<audio controls class="w-full mb-1.5"><source src="' + m.media_data + '" type="' + m.media_mime + '"></audio>';
    } else if (m.media_mime.indexOf('video') === 0) {
      html += '<video controls class="rounded-lg max-w-full max-h-64 mb-1.5"><source src="' + m.media_data + '" type="' + m.media_mime + '"></video>';
    } else {
      // Document / other file (PDF, DOCX…) → open-in-new-tab link. The filename
      // lives in message_text, so use it as the label and skip the duplicate
      // text line below.
      var docLabel = (m.message_text && m.message_text !== '[Document]') ? m.message_text : 'Document';
      html += '<a href="' + m.media_data + '" target="_blank" rel="noopener" class="inline-flex items-center gap-1.5 px-3 py-2 mb-1.5 rounded-lg bg-indigo-50 text-indigo-700 text-sm font-medium hover:bg-indigo-100 border border-indigo-200 transition">📄 <span>' + esc(docLabel) + '</span><span class="text-xs text-indigo-400 ml-1">open &#8599;</span></a>';
      docLinkRendered = true;
    }
  } else if (m.message_type === 'image' && !m.media_data) {
    // Legacy outbound image rows logged before the URL-storage fix
    html += '<span class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-gray-100 text-gray-500 text-xs mb-1.5">🖼 Image (URL not stored)</span>';
  } else if (m.message_type === 'sticker' && !m.media_data) {
    html += '<span class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-gray-100 text-gray-500 text-xs mb-1.5">🎭 Sticker (not downloaded)</span>';
  }
  // When translation toggle is on AND we have a translation for this
  // message id, render the translated text instead. The original is
  // still stored in m.message_text — we don't mutate it, just swap
  // what we display.
  var bodyText = m.message_text || '';
  if (useTranslated) {
    var cache = translationsByConv[currentConvUserId];
    if (cache && cache.byId && cache.byId[m.id]) {
      bodyText = cache.byId[m.id];
    }
  }
  if (bodyText && !docLinkRendered) {
    html += '<p class="whitespace-pre-wrap">' + esc(bodyText) + '</p>';
  }
  return html;
}

function openConversation(userId, phone, name) {
  currentConvUserId = userId;
  currentConvPhone = phone;
  var modal = document.getElementById('conv-modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  document.getElementById('conv-modal-title').textContent = name || phone;
  document.getElementById('conv-modal-subtitle').textContent = phone;
  // Sync favourite star in modal header
  var mBtn = document.getElementById('modal-fav-btn');
  if (mBtn) { mBtn.innerHTML = isFavorite(userId) ? '&#9733;' : '&#9734;'; mBtn.style.color = isFavorite(userId) ? '#f59e0b' : '#6b7280'; }
  document.getElementById('conv-modal-body').innerHTML = '<div class="flex justify-center py-8"><div class="loader"></div></div>';
  var replyEl = document.getElementById('admin-reply-input');
  replyEl.value = '';
  autoGrowReply(replyEl);
  updateTakeoverButton(false); // default until we know

  api('conversations/' + userId).then(function(data) {
    var user = data.user;
    var msgs = data.messages;
    var win = data.window || {};
    var isTakenOver = user.metadata && user.metadata.humanTakeover;
    updateTakeoverButton(isTakenOver);

    // Detected user language — pulled from cached metadata if already
    // set, otherwise auto-fired in the background via the
    // detect-language endpoint. Shown as a small amber pill in the
    // modal subtitle. English is suppressed (default, not interesting).
    renderDetectedLanguage(user);
    var alreadyHasLang = user.metadata && user.metadata.detectedLanguage && user.metadata.detectedLanguage.name;
    var hasInbound = msgs && msgs.some(function(m) { return m.role === 'user' && m.message_text; });
    if (!alreadyHasLang && hasInbound) {
      // Fire-and-forget — when it returns we patch the subtitle in place.
      detectLanguageInBackground(userId);
    }

    // 24h-window status banner — WhatsApp-only. Green = can reply
    // free-form. Red = window closed, admin needs an approved template
    // to message the user. Also updates the Send input's placeholder
    // below.
    var windowBanner = '';
    var isWhatsApp = (user.channel || 'whatsapp') === 'whatsapp';
    if (isWhatsApp) {
      if (win.within_24h) {
        windowBanner = '<div class="bg-green-50 border border-green-200 rounded-lg p-3 mb-4 text-xs text-green-800 flex items-center gap-2">' +
          '<span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>' +
          '<span><b>24h reply window: open</b>' + (win.hours_since_inbound != null ? ' (last inbound ' + win.hours_since_inbound + 'h ago)' : '') + ' — free-form replies will go through.</span>' +
          '</div>';
      } else if (win.last_inbound_at) {
        windowBanner = '<div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-4 text-xs text-red-800 flex items-start gap-2">' +
          '<span class="inline-block w-2 h-2 rounded-full bg-red-500 mt-1 shrink-0"></span>' +
          '<span><b>24h reply window: closed</b> (' + (win.hours_since_inbound || 0) + 'h since last inbound) — WhatsApp will reject free-form replies. The user must send a message first, OR we need to send an approved template (HSM) to re-open the window.</span>' +
          '</div>';
      } else {
        windowBanner = '<div class="bg-gray-50 border border-gray-200 rounded-lg p-3 mb-4 text-xs text-gray-700 flex items-center gap-2">' +
          '<span class="inline-block w-2 h-2 rounded-full bg-gray-400"></span>' +
          '<span><b>No inbound yet</b> — this user hasn\'t messaged us. Only approved templates can be sent first.</span>' +
          '</div>';
      }
    }

    // Update the Send input placeholder / enabled state based on window.
    var replyInput = document.getElementById('admin-reply-input');
    if (replyInput) {
      if (isWhatsApp && !win.within_24h) {
        replyInput.placeholder = '24h window closed — send may fail (template required)';
      } else {
        replyInput.placeholder = 'Type a message...';
      }
    }

    // Index of the most recent "[Flow submitted]" bubble — the durable flow
    // form submission (data.flowSubmission) is rendered inline right there.
    var lastFlowIdx = -1;
    (msgs || []).forEach(function(m, i) { if (m.message_text === '[Flow submitted]') lastFlowIdx = i; });

    var html = windowBanner +
    '<div class="bg-indigo-50 rounded-lg p-3 mb-4 text-xs space-y-1">' +
      '<p><b>State:</b> ' + esc(user.state) + (isTakenOver ? ' <span class="badge bg-red-100 text-red-700 ml-1">Human Control</span>' : '') + '</p>' +
      '<p><b>Joined:</b> ' + fmtDate(user.created_at) + '</p>' +
      (user.metadata && user.metadata.leadBrief ? '<p><b>Lead Brief:</b> ' + esc(user.metadata.leadBrief).slice(0, 300) + '</p>' : '') +
      (user.metadata && user.metadata.adSource ? '<p><b>Ad Source:</b> ' + esc(user.metadata.adSource) + '</p>' : '') +
    '</div>' +
    (user.metadata && user.metadata.websiteData ? renderWebsiteIntake(user.metadata.websiteData) : '') +
    '<div id="conv-llm-cost" class="bg-amber-50 rounded-lg p-3 mb-4 text-xs">' +
      '<p class="text-gray-500">Calculating LLM cost...</p>' +
    '</div>';

    var translateState = translationsByConv[userId] || {};
    var useTranslated = !!translateState.on;
    msgs.forEach(function(m, idx) {
      if (m.role === 'system') {
        // /reset sentinels and other system-role rows render as a
        // centered divider instead of a chat bubble so they read as
        // boundaries in the timeline, not messages exchanged with
        // the user.
        html += '<div class="flex items-center gap-2 my-3 text-[11px] text-gray-400 uppercase tracking-wider">' +
          '<div class="flex-1 h-px bg-gray-200"></div>' +
          '<span>' + esc(m.message_text || 'system') + '</span>' +
          '<div class="flex-1 h-px bg-gray-200"></div>' +
        '</div>';
        return;
      }
      var isUser = m.role === 'user';
      html += '<div class="max-w-[85%] rounded-2xl px-4 py-2.5 text-sm ' + (isUser ? 'chat-user' : 'chat-bot') + '">' +
        renderMessageContent(m, useTranslated) +
        '<p class="text-[10px] text-gray-400 mt-1">' + fmtDate(m.created_at) + '</p>' +
      '</div>';
      // A Flow submission logs only the literal "[Flow submitted]" bubble.
      // Surface what the user actually entered, right here at the latest
      // submission — sourced from flow_sessions (durable; survives /reset),
      // not user.metadata.websiteData (which a later /reset would wipe).
      if (idx === lastFlowIdx && data.flowSubmission) {
        html += renderFlowSubmission(data.flowSubmission);
      }
    });

    if (!msgs.length) html += '<p class="text-center text-gray-400 py-8">No messages yet</p>';
    document.getElementById('conv-modal-body').innerHTML = html;
    document.getElementById('conv-modal-body').scrollTop = document.getElementById('conv-modal-body').scrollHeight;
    lastMsgCount = msgs.length;
    lastConvMessages = msgs;
    // Show the translate toggle now that we have messages. Reflect cached
    // state — if the user already toggled translation on for this convo
    // earlier in the session, the button shows the active style.
    var tBtn = document.getElementById('translate-btn');
    if (tBtn) {
      tBtn.classList.toggle('hidden', !msgs.length);
      updateTranslateButtonState();
    }

    // Start polling for new messages every 5s
    if (convPollInterval) clearInterval(convPollInterval);
    convPollInterval = setInterval(function() { pollConversation(); }, 5000);

    // Load LLM cost breakdown in parallel — non-critical, don't block the view.
    loadLlmCost(userId);
    // Phase 1 observability — load classifier traces in parallel and
    // attach them to user messages by turn timestamp once both arrive.
    loadClassifierTraces(userId, msgs);
  }).catch(function(err) {
    document.getElementById('conv-modal-body').innerHTML = '<p class="text-red-500">Failed to load: ' + esc(err.message) + '</p>';
  });
}

// ─── Classifier trace (Phase 1 observability) ─────────────────────
// Fetches all classifier_decisions rows for the user, groups by turn_id,
// and attaches each turn to the user message that triggered it (latest
// user message before the turn's first decision). Renders a "🔍 Trace"
// toggle inline on each user message bubble that expands to show the
// full per-turn decision graph.
function loadClassifierTraces(userId, msgs) {
  api('conversations/' + userId + '/decisions').then(function(decisions) {
    if (!Array.isArray(decisions) || decisions.length === 0) return;
    // 1. Group decisions by turn_id (and sort each turn oldest-first).
    var turns = {};
    decisions.forEach(function(d) {
      if (!d.turn_id) return;
      if (!turns[d.turn_id]) turns[d.turn_id] = [];
      turns[d.turn_id].push(d);
    });
    Object.keys(turns).forEach(function(tid) {
      turns[tid].sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
    });
    // 2. Map each turn to the most-recent user message before it.
    var userMsgs = msgs.filter(function(m) { return m.role === 'user'; })
                        .sort(function(a, b) { return new Date(a.created_at) - new Date(b.created_at); });
    var traceByMsgId = {};
    Object.keys(turns).forEach(function(tid) {
      var turnStart = new Date(turns[tid][0].created_at);
      var match = null;
      for (var i = userMsgs.length - 1; i >= 0; i--) {
        if (new Date(userMsgs[i].created_at) <= turnStart) { match = userMsgs[i]; break; }
      }
      if (match) traceByMsgId[match.id] = turns[tid];
    });
    // 3. Render: find each user message bubble in the DOM (we can't
    //    cleanly back-reference from text, so re-render the relevant
    //    bubbles' inner HTML by walking the modal body). Cheaper /
    //    safer: build a sidebar trace panel keyed by message timestamp.
    //    Append a toggle to each user message bubble whose data-msg-id
    //    matches an entry in traceByMsgId.
    var body = document.getElementById('conv-modal-body');
    if (!body) return;
    // Re-render approach: walk through msgs, find their bubbles by
    // index in the rendered list, and inject the toggle inline. The
    // simplest stable mapping is to give each user-message bubble a
    // data-msg-id attribute on first render — but the existing
    // openConversation doesn't do that. Workaround: append a single
    // collapsible "Classifier Trace" panel at the bottom listing all
    // turns in chronological order with the user-message preview as
    // the header, plus per-classifier decision rows. Simpler, still
    // useful for debugging.
    var turnList = Object.keys(turns).map(function(tid) {
      var t = turns[tid];
      var ts = t[0].created_at;
      var matchMsg = null;
      for (var i = userMsgs.length - 1; i >= 0; i--) {
        if (new Date(userMsgs[i].created_at) <= new Date(ts)) { matchMsg = userMsgs[i]; break; }
      }
      var msgPreview = matchMsg
        ? esc(String(matchMsg.message_text || '').slice(0, 80))
        : '<i>no matching user msg</i>';
      var rows = t.map(function(d) {
        var out = '';
        try { out = JSON.stringify(d.output, null, 0); } catch (_) { out = String(d.output); }
        var ctx = '';
        try { ctx = d.input_context && Object.keys(d.input_context).length ? JSON.stringify(d.input_context) : ''; } catch (_) {}
        return '<tr class="border-t border-gray-100">' +
          '<td class="py-1 pr-2 font-mono text-[10px] text-indigo-700 align-top whitespace-nowrap">' + esc(d.classifier) + '</td>' +
          '<td class="py-1 pr-2 text-[10px] align-top text-gray-700"><pre class="whitespace-pre-wrap break-all">' + esc(out.slice(0, 400)) + '</pre>' +
            (ctx ? '<div class="text-[9px] text-gray-400 mt-0.5">ctx: ' + esc(ctx.slice(0, 200)) + '</div>' : '') +
          '</td>' +
          '<td class="py-1 pr-2 text-right text-[10px] text-gray-500 align-top whitespace-nowrap">' + (d.latency_ms != null ? d.latency_ms + 'ms' : '') + '</td>' +
        '</tr>';
      }).join('');
      return '<details class="mb-2 border border-gray-200 rounded-lg p-2">' +
        '<summary class="cursor-pointer text-[11px] font-semibold text-gray-700">' +
          '🔍 Turn at ' + fmtDate(ts) + ' · <span class="text-gray-500 font-normal">' + msgPreview + '</span> · <span class="text-indigo-600">' + t.length + ' decisions</span>' +
        '</summary>' +
        '<table class="w-full mt-2 text-[10px]">' +
          '<thead><tr class="text-gray-400"><th class="text-left">Classifier</th><th class="text-left">Output</th><th class="text-right">Latency</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</details>';
    }).join('');
    var panelHtml =
      '<div class="bg-white border border-gray-200 rounded-lg p-3 mt-4 mb-2">' +
        '<div class="flex items-center justify-between mb-2">' +
          '<p class="text-xs font-bold text-gray-700">🔍 Classifier Trace</p>' +
          '<p class="text-[10px] text-gray-500">' + Object.keys(turns).length + ' turn(s) · ' + decisions.length + ' decision(s)</p>' +
        '</div>' +
        turnList +
      '</div>';
    body.insertAdjacentHTML('beforeend', panelHtml);
  }).catch(function() { /* observability is best-effort — no error UI */ });
}

function fmtUSD(n) {
  var x = Number(n || 0);
  if (x < 0.01) return '$' + x.toFixed(5);
  return '$' + x.toFixed(4);
}

function loadLlmCost(userId) {
  api('conversations/' + userId + '/llm-usage').then(function(data) {
    var panel = document.getElementById('conv-llm-cost');
    if (!panel) return;
    var totals = data.totals || { cost_usd: 0, input_tokens: 0, output_tokens: 0, calls: 0 };
    var breakdown = data.breakdown || [];
    if (!totals.calls) {
      panel.innerHTML = '<p class="text-gray-500"><b>LLM Cost:</b> no tracked calls yet</p>';
      return;
    }
    var rows = breakdown.map(function(b) {
      return '<tr class="border-t border-amber-200">' +
        '<td class="py-1 pr-2 font-mono text-[11px]">' + esc(b.operation) + '</td>' +
        '<td class="py-1 pr-2 text-right">' + b.calls + '</td>' +
        '<td class="py-1 pr-2 text-right">' + (b.input_tokens + b.output_tokens).toLocaleString() + '</td>' +
        '<td class="py-1 pr-2 text-right font-semibold">' + fmtUSD(b.cost_usd) + '</td>' +
      '</tr>';
    }).join('');
    var cacheLine = totals.cached_input_tokens > 0
      ? ' · <span class="text-green-700">' + totals.cached_input_tokens.toLocaleString() + ' cached (' + totals.cache_hit_pct + '% hit)</span>'
      : '';
    panel.innerHTML =
      '<div class="flex items-baseline justify-between mb-2">' +
        '<p><b>LLM Cost (total):</b></p>' +
        '<p class="text-base font-bold text-amber-700">' + fmtUSD(totals.cost_usd) + '</p>' +
      '</div>' +
      '<p class="text-[11px] text-gray-600 mb-2">' +
        totals.calls + ' calls · ' + totals.input_tokens.toLocaleString() + ' in / ' +
        totals.output_tokens.toLocaleString() + ' out tokens' +
        cacheLine +
      '</p>' +
      '<table class="w-full text-[11px]">' +
        '<thead><tr class="text-gray-500">' +
          '<th class="text-left py-1 pr-2">Operation</th>' +
          '<th class="text-right py-1 pr-2">Calls</th>' +
          '<th class="text-right py-1 pr-2">Tokens</th>' +
          '<th class="text-right py-1 pr-2">Cost</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';
  }).catch(function(err) {
    var panel = document.getElementById('conv-llm-cost');
    if (panel) panel.innerHTML = '<p class="text-gray-500">LLM cost unavailable</p>';
  });
}

function pollConversation() {
  if (!currentConvUserId) return;
  api('conversations/' + currentConvUserId).then(function(data) {
    var msgs = data.messages;
    if (msgs.length <= lastMsgCount) return;
    // New messages — append only the new ones (slice from the end since msgs are oldest-first).
    // Note: newly-arrived messages are NOT yet translated. They render in
    // their original language even if the toggle is on; the user can hit
    // the toggle off-then-on to refresh the cache when they want.
    var body = document.getElementById('conv-modal-body');
    var newMsgs = msgs.slice(lastMsgCount);
    newMsgs.forEach(function(m) {
      if (m.role === 'system') {
        var sysDiv = document.createElement('div');
        sysDiv.className = 'flex items-center gap-2 my-3 text-[11px] text-gray-400 uppercase tracking-wider';
        sysDiv.innerHTML =
          '<div class="flex-1 h-px bg-gray-200"></div>' +
          '<span>' + esc(m.message_text || 'system') + '</span>' +
          '<div class="flex-1 h-px bg-gray-200"></div>';
        body.appendChild(sysDiv);
        return;
      }
      var isUser = m.role === 'user';
      var div = document.createElement('div');
      div.className = 'max-w-[85%] rounded-2xl px-4 py-2.5 text-sm ' + (isUser ? 'chat-user' : 'chat-bot');
      div.innerHTML = renderMessageContent(m, false) +
        '<p class="text-[10px] text-gray-400 mt-1">' + fmtDate(m.created_at) + '</p>';
      body.appendChild(div);
    });
    body.scrollTop = body.scrollHeight;
    lastMsgCount = msgs.length;
    lastConvMessages = msgs;
  }).catch(function() {});
}

// Re-render the conversation modal body using cached messages, applying
// the current translation toggle state. Used by toggleTranslate so we
// don't re-fetch from the server.
function rerenderConversationBody() {
  var body = document.getElementById('conv-modal-body');
  if (!body || !lastConvMessages || !lastConvMessages.length) return;
  var translateState = translationsByConv[currentConvUserId] || {};
  var useTranslated = !!translateState.on;
  var html = '';
  // Preserve the banner / state-info / cost-panel divs already at the top
  // of the modal body. We re-render only the message bubbles section.
  // Since the original openConversation builds banner+messages in one
  // pass, the simplest reliable approach is to walk the body's children
  // and only swap the message bubbles. We'll just rebuild messages
  // section by removing existing bubbles and appending fresh ones.
  // Find the index after the cost panel — keep everything up to and
  // including that node, drop the rest, then append fresh message DOM.
  var costPanel = document.getElementById('conv-llm-cost');
  if (costPanel && costPanel.parentNode === body) {
    // Remove all siblings AFTER the cost panel.
    while (costPanel.nextSibling) body.removeChild(costPanel.nextSibling);
  } else {
    // Fallback: if we can't find the panel anchor, full re-render is
    // safer than risking duplicated bubbles.
    body.innerHTML = '';
  }
  lastConvMessages.forEach(function(m) {
    if (m.role === 'system') {
      var sysDiv = document.createElement('div');
      sysDiv.className = 'flex items-center gap-2 my-3 text-[11px] text-gray-400 uppercase tracking-wider';
      sysDiv.innerHTML =
        '<div class="flex-1 h-px bg-gray-200"></div>' +
        '<span>' + esc(m.message_text || 'system') + '</span>' +
        '<div class="flex-1 h-px bg-gray-200"></div>';
      body.appendChild(sysDiv);
      return;
    }
    var isUser = m.role === 'user';
    var div = document.createElement('div');
    div.className = 'max-w-[85%] rounded-2xl px-4 py-2.5 text-sm ' + (isUser ? 'chat-user' : 'chat-bot');
    div.innerHTML = renderMessageContent(m, useTranslated) +
      '<p class="text-[10px] text-gray-400 mt-1">' + fmtDate(m.created_at) + '</p>';
    body.appendChild(div);
  });
  // Re-attach classifier traces (stored in a cache by loadClassifierTraces) —
  // if you've already loaded them, calling loadClassifierTraces again
  // re-uses the cached result and reattaches the trace toggles cleanly.
  loadClassifierTraces(currentConvUserId, lastConvMessages);
}

// Render the detected-language pill into the modal subtitle. Idempotent —
// called on modal open AND after the background detect call returns.
// Suppresses English (the bot's default) so the subtitle stays clean
// for the common case.
function renderDetectedLanguage(user) {
  var subtitle = document.getElementById('conv-modal-subtitle');
  if (!subtitle) return;
  // Always reset to phone — caller may pass a user whose detection
  // got cleared, or this is a re-render after detection completed.
  var phone = (user && user.phone_number) ? esc(user.phone_number) : (currentConvPhone ? esc(currentConvPhone) : '');
  var lang = user && user.metadata && user.metadata.detectedLanguage;
  if (lang && lang.name && !/^english$/i.test(lang.name)) {
    subtitle.innerHTML = phone + ' &middot; <span class="text-amber-700" title="Detected user language">🌐 ' + esc(lang.name) + '</span>';
  } else {
    subtitle.textContent = phone;
  }
}

// Fire the detect-language endpoint in the background. When it
// returns, patch the modal subtitle in place (only if the user is
// still viewing the same conversation). Failures are silent — admin
// doesn't need to see them, the badge just doesn't appear.
function detectLanguageInBackground(userId) {
  fetch('/admin/api/conversations/' + userId + '/detect-language', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  }).then(function(r) {
    if (!r.ok) return null;
    return r.json();
  }).then(function(data) {
    if (!data || !data.language) return;
    if (currentConvUserId !== userId) return; // user switched convos
    // Build a synthetic user object with the detected lang patched in,
    // so renderDetectedLanguage can do its thing.
    renderDetectedLanguage({
      phone_number: currentConvPhone,
      metadata: { detectedLanguage: { name: data.language, code: data.code } },
    });
  }).catch(function() { /* silent */ });
}

function updateTranslateButtonState() {
  var btn = document.getElementById('translate-btn');
  if (!btn) return;
  var translateState = translationsByConv[currentConvUserId] || {};
  if (translateState.loading) {
    btn.textContent = '🌐 Translating…';
    btn.disabled = true;
    btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
    btn.classList.add('opacity-60');
    return;
  }
  btn.disabled = false;
  btn.classList.remove('opacity-60');
  if (translateState.on) {
    btn.textContent = '🌐 Show Original';
    btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
    btn.classList.remove('hover:bg-gray-50');
  } else {
    btn.textContent = '🌐 Translate';
    btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
    btn.classList.add('hover:bg-gray-50');
  }
}

// Toggle: original ⇄ English. First toggle-on per-convo fetches from the
// server; subsequent toggles use the in-memory cache and are instant.
function toggleTranslate() {
  if (!currentConvUserId) return;
  var state = translationsByConv[currentConvUserId];
  // Already-loaded → instant flip
  if (state && state.byId) {
    state.on = !state.on;
    translationsByConv[currentConvUserId] = state;
    updateTranslateButtonState();
    rerenderConversationBody();
    return;
  }
  // First-time fetch
  translationsByConv[currentConvUserId] = { on: false, byId: null, loading: true };
  updateTranslateButtonState();
  var userId = currentConvUserId;
  fetch('/admin/api/conversations/' + userId + '/translate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data) {
    var byId = {};
    (data.translations || []).forEach(function(t) {
      if (t && t.id) byId[t.id] = t.en;
    });
    // Only update if the user is still looking at the same convo. If they
    // closed the modal mid-fetch, drop the result silently.
    if (currentConvUserId !== userId) {
      // Still cache it for if they reopen the same convo.
      translationsByConv[userId] = { on: false, byId: byId, loading: false };
      return;
    }
    translationsByConv[userId] = { on: true, byId: byId, loading: false };
    updateTranslateButtonState();
    rerenderConversationBody();
  }).catch(function(err) {
    if (translationsByConv[userId]) translationsByConv[userId].loading = false;
    if (currentConvUserId === userId) updateTranslateButtonState();
    alert('Translation failed: ' + (err && err.message ? err.message : 'unknown error'));
  });
}

function closeConvModal() {
  if (convPollInterval) { clearInterval(convPollInterval); convPollInterval = null; }
  var modal = document.getElementById('conv-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  currentConvUserId = null;
  currentConvPhone = null;
  lastConvMessages = [];
  // Hide translate button so it doesn't flash before the next modal opens.
  var tBtn = document.getElementById('translate-btn');
  if (tBtn) tBtn.classList.add('hidden');
  // Close download menu if open
  var dd = document.getElementById('dl-dropdown');
  if (dd) dd.classList.add('hidden');
}

// ─── Download conversation ─────────────────────
function downloadConversation(format, includeSummary) {
  var dd = document.getElementById('dl-dropdown');
  if (dd) dd.classList.add('hidden');

  var msgs = lastConvMessages;
  if (!msgs || !msgs.length) { alert('No messages to download.'); return; }

  var titleEl = document.getElementById('conv-modal-title');
  var subtitleEl = document.getElementById('conv-modal-subtitle');
  var convName = (titleEl ? titleEl.textContent : '') || 'Conversation';
  var convPhone = (subtitleEl ? subtitleEl.textContent : '') || '';
  var now = new Date().toLocaleString();

  // Lead brief from cached leads row
  function getBrief() {
    var lead = leadsData && leadsData.find(function(l) { return l.id === currentConvUserId; });
    return (lead && lead.lead_brief) || null;
  }

  // ── TXT ──────────────────────────────────────
  if (format === 'txt') {
    var lines = [];
    lines.push('Conversation: ' + convName + ' (' + convPhone + ')');
    lines.push('Exported: ' + now);
    lines.push('');
    if (includeSummary) {
      var brief = getBrief();
      lines.push('── Lead Summary ──');
      lines.push(brief || '(No summary available for this conversation)');
      lines.push('');
    }
    msgs.forEach(function(m) {
      if (m.role === 'system') {
        lines.push('── ' + (m.message_text || 'system') + ' ──');
      } else {
        var who = m.role === 'user' ? (convName || convPhone) : 'Pixie';
        var ts = m.created_at ? new Date(m.created_at).toLocaleString() : '';
        lines.push('[' + ts + '] ' + who + ':');
        lines.push(m.message_text || '(media)');
      }
      lines.push('');
    });
    var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (convPhone || 'conversation').replace(/[^a-z0-9+]/gi, '_') + '_' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
    return;
  }

  // ── PDF (print-to-PDF via new window) ────────
  if (format === 'pdf') {
    var html = '<!DOCTYPE html><html><head><meta charset="utf-8">' +
      '<title>' + esc(convName) + ' — Pixie Chat</title>' +
      '<style>' +
        'body{font-family:system-ui,sans-serif;font-size:13px;color:#111;padding:32px;max-width:720px;margin:0 auto}' +
        'h1{font-size:18px;margin-bottom:4px}' +
        '.meta{color:#666;font-size:11px;margin-bottom:24px}' +
        '.summary{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:14px 16px;margin-bottom:24px;font-size:12px;white-space:pre-wrap;word-break:break-word}' +
        '.summary h2{font-size:13px;font-weight:600;margin:0 0 8px}' +
        '.bubble{border-radius:12px;padding:9px 13px;margin-bottom:10px;max-width:78%;font-size:12.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}' +
        '.user{background:#e0e7ff;margin-right:auto}' +
        '.bot{background:#f3f4f6;margin-left:auto}' +
        '.ts{font-size:10px;color:#9ca3af;margin-top:3px}' +
        '.divider{text-align:center;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin:16px 0;border-top:1px solid #e5e7eb;padding-top:8px}' +
        '@media print{body{padding:16px}}' +
      '</style></head><body>' +
      '<h1>' + esc(convName) + '</h1>' +
      '<p class="meta">' + esc(convPhone) + ' &nbsp;·&nbsp; Exported ' + esc(now) + '</p>';

    if (includeSummary) {
      var brief2 = getBrief();
      html += '<div class="summary"><h2>Lead Summary</h2>' +
        esc(brief2 || 'No summary available for this conversation') + '</div>';
    }

    msgs.forEach(function(m) {
      if (m.role === 'system') {
        html += '<div class="divider">' + esc(m.message_text || 'system') + '</div>';
        return;
      }
      var isUser = m.role === 'user';
      var ts = m.created_at ? new Date(m.created_at).toLocaleString() : '';
      html += '<div class="bubble ' + (isUser ? 'user' : 'bot') + '">' +
        '<div>' + esc(m.message_text || '(media)') + '</div>' +
        '<div class="ts">' + esc(isUser ? (convName || convPhone) : 'Pixie') + (ts ? ' · ' + esc(ts) : '') + '</div>' +
        '</div>';
    });
    html += '</body></html>';

    var win = window.open('', '_blank', 'width=780,height=900');
    if (!win) { alert('Pop-up blocked — allow popups for this page to use PDF download.'); return; }
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(function() { win.print(); }, 400);
  }
}

// Auto-grow the reply textarea up to the CSS max-height (Tailwind max-h-40 → 10rem).
// Resetting height to 'auto' first lets scrollHeight shrink when text is deleted.
function autoGrowReply(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// Enter sends, Shift+Enter (or Ctrl/Cmd/Alt+Enter) inserts a newline.
// Matches WhatsApp/Slack composer behaviour.
function replyKeydown(e) {
  if (e.key !== 'Enter' || e.isComposing) return;
  // Any modifier + Enter → let the textarea's default insert a newline.
  // stopPropagation guards against any ancestor listener that might submit.
  if (e.shiftKey || e.ctrlKey || e.metaKey || e.altKey) {
    e.stopPropagation();
    return;
  }
  // Plain Enter → send.
  e.preventDefault();
  document.getElementById('admin-reply-form').requestSubmit();
}

function sendAdminReply(e) {
  e.preventDefault();
  var input = document.getElementById('admin-reply-input');
  var btn = document.getElementById('admin-reply-btn');
  var text = input.value.trim();
  if (!text || !currentConvUserId) return;

  btn.disabled = true;
  btn.textContent = 'Sending...';

  fetch('/admin/api/conversations/' + currentConvUserId + '/reply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messageText: text }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      // Append the message to the chat immediately (optimistic UI).
      var body = document.getElementById('conv-modal-body');
      var msgDiv = document.createElement('div');
      msgDiv.className = 'max-w-[85%] rounded-2xl px-4 py-2.5 text-sm chat-bot';
      msgDiv.innerHTML = '<p class="whitespace-pre-wrap">' + esc(text) + '</p>' +
        '<p class="text-[10px] text-gray-400 mt-1">Just now (manual)</p>';
      body.appendChild(msgDiv);
      body.scrollTop = body.scrollHeight;
      input.value = '';
      autoGrowReply(input);
      // The backend has already written this message to the conversations
      // table by the time we get here. Bump lastMsgCount so the next 5s
      // poll doesn't see it as "new" and append a duplicate bubble.
      lastMsgCount += 1;
      // Update the cached leads row so the Manual badge + amber highlight
      // update live without a reload when the operator closes the modal.
      if (Array.isArray(leadsData)) {
        var row = leadsData.find(function(l) { return l.id === currentConvUserId; });
        if (row) {
          row.manual_count = (row.manual_count || 0) + 1;
          row.has_manual = true;
          row.message_count = (row.message_count || 0) + 1;
          row.last_message_at = new Date().toISOString();
        }
      }
    } else {
      // Surface the structured detail when the backend returned a 409
      // (WhatsApp-specific policy error) so the operator knows WHY the
      // send failed rather than seeing a generic "Unknown error".
      var msg = data.error || 'Unknown error';
      if (data.detail) msg += '\n\n' + data.detail;
      if (data.metaCode) msg += '\n\nMeta code: ' + data.metaCode;
      alert('Failed to send: ' + msg);
    }
  })
  .catch(function(err) {
    alert('Error: ' + err.message);
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = 'Send';
  });
}

function updateTakeoverButton(isTakenOver) {
  var btn = document.getElementById('takeover-btn');
  var status = document.getElementById('takeover-status');
  if (isTakenOver) {
    btn.textContent = '🤖 Release to AI';
    btn.className = 'px-4 py-2 text-xs font-semibold rounded-lg transition bg-green-500 text-white hover:bg-green-600';
    status.textContent = 'AI is paused — you are in control';
    status.className = 'text-xs text-red-500 font-medium';
  } else {
    btn.textContent = '🙋 Take Over';
    btn.className = 'px-4 py-2 text-xs font-semibold rounded-lg transition bg-red-500 text-white hover:bg-red-600';
    status.textContent = 'AI is handling this conversation';
    status.className = 'text-xs text-green-500 font-medium';
  }
  btn.dataset.active = isTakenOver ? '1' : '0';
}

function toggleTakeover() {
  if (!currentConvUserId) return;
  var btn = document.getElementById('takeover-btn');
  var isCurrentlyTakenOver = btn.dataset.active === '1';
  var newState = !isCurrentlyTakenOver;

  btn.disabled = true;
  btn.textContent = 'Updating...';

  fetch('/admin/api/conversations/' + currentConvUserId + '/takeover', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ takeover: newState }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      updateTakeoverButton(newState);
      // Keep the cached leads list in sync so the amber highlight and the
      // Manual / AI Only filter counts reflect the toggle without a reload.
      // If the user is on the Conversations tab, re-render it now.
      if (Array.isArray(leadsData)) {
        var row = leadsData.find(function(l) { return l.id === currentConvUserId; });
        if (row) {
          row.human_takeover = newState;
          row.has_manual = newState || (row.manual_count || 0) > 0;
        }
      }
      if (currentSection === 'conversations') {
        renderConversations(leadsData);
      }
    } else {
      alert('Failed: ' + (data.error || 'Unknown error'));
    }
  })
  .catch(function(err) { alert('Error: ' + err.message); })
  .finally(function() { btn.disabled = false; });
}

document.getElementById('conv-modal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeConvModal();
});

// ─── Drop-offs ─────────────────────────────────
function renderDropoffs(dropoffs) {
  var byState = {};
  dropoffs.forEach(function(d) {
    if (!byState[d.state]) byState[d.state] = [];
    byState[d.state].push(d);
  });

  var stateCards = Object.entries(byState)
    .sort(function(a, b) { return b[1].length - a[1].length; })
    .map(function(entry) {
      var state = entry[0], users = entry[1];
      return '<div class="bg-white rounded-xl border p-5 mb-4">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<div class="flex items-center gap-2">' + stateBadge(state) + '<span class="text-sm text-gray-500">' + users.length + ' users stuck here</span></div>' +
        '</div>' +
        '<div class="space-y-2">' +
          users.slice(0, 10).map(function(u) {
            return '<div class="flex items-center justify-between py-2 border-b last:border-0">' +
              '<div class="flex-1 min-w-0">' +
                '<p class="text-sm font-medium">' + esc(u.name || u.phone_number) + '</p>' +
                '<p class="text-xs text-gray-400 truncate">Last said: "' + esc(u.last_user_message || '-') + '"</p>' +
              '</div>' +
              '<div class="text-right ml-4 flex-shrink-0">' +
                '<p class="text-xs font-semibold text-red-500">' + u.hours_inactive + 'h inactive</p>' +
                '<button onclick="openConversation(\'' + u.id + '\', \'' + esc(u.phone_number) + '\', \'' + esc(u.name || '') + '\')" class="text-xs text-indigo-600 hover:underline">View Chat</button>' +
              '</div>' +
            '</div>';
          }).join('') +
          (users.length > 10 ? '<p class="text-xs text-gray-400 pt-2">+' + (users.length - 10) + ' more</p>' : '') +
        '</div>' +
      '</div>';
    }).join('');

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<h2 class="text-2xl font-bold mb-2">Drop-off Analysis</h2>' +
    '<p class="text-gray-500 text-sm mb-6">Users inactive for 24h+ who have not converted. Grouped by where they stopped.</p>' +
    (dropoffs.length ? stateCards : '<div class="bg-green-50 text-green-700 rounded-xl p-6 text-center">No significant drop-offs detected!</div>') +
  '</div>';
}

  // Build drop-off stats
  var statsHTML = stages.map(function(s, i) {
    var dropPct = (i > 0 && stages[i-1].count > 0) ? Math.round((1 - s.count / stages[i-1].count) * 100) : 0;
    return '<div class="flex items-center justify-between p-3 ' + (i % 2 === 0 ? 'bg-gray-50' : '') + ' rounded-lg">' +
      '<span class="text-sm font-medium">' + esc(s.name) + '</span>' +
      '<div class="flex items-center gap-3">' +
        '<span class="text-sm font-bold">' + s.count + '</span>' +
        (i > 0 ? '<span class="badge bg-red-100 text-red-600">-' + dropPct + '%</span>' : '<span class="badge bg-green-100 text-green-700">start</span>') +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<h2 class="text-2xl font-bold mb-2">Conversion Funnel</h2>' +
    '<p class="text-gray-500 text-sm mb-6">How users progress from first contact to closed lead.</p>' +
    '<div class="grid md:grid-cols-2 gap-6">' +
      '<div class="bg-white rounded-xl border p-6">' +
        '<h3 class="font-semibold mb-4">Funnel Chart</h3>' +
        '<div style="height:320px"><canvas id="chart-funnel"></canvas></div>' +
      '</div>' +
      '<div class="bg-white rounded-xl border p-6">' +
        '<h3 class="font-semibold mb-4">Stage-by-Stage Drop-off</h3>' +
        '<div class="space-y-1">' + statsHTML + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  // Funnel chart - horizontal bar with gradient colors
  var funnelColors = ['#6366f1', '#818cf8', '#a78bfa', '#c4b5fd', '#ddd6fe', '#ede9fe'];
  activeCharts.push(new Chart(document.getElementById('chart-funnel'), {
    type: 'bar',
    data: {
      labels: stages.map(function(s) { return s.name; }),
      datasets: [{
        data: stages.map(function(s) { return s.count; }),

        borderSkipped: false

        y: { ticks: { font: { family: 'Inter', size: 12, weight: 500 } }, grid: { display: false } }

// ─── Audits ────────────────────────────────────
function scoreColor(s) {
  if (s >= 80) return { bg: 'bg-green-500', text: 'text-green-700', ring: 'ring-green-200', label: 'Good' };
  if (s >= 60) return { bg: 'bg-yellow-500', text: 'text-yellow-700', ring: 'ring-yellow-200', label: 'Needs Work' };
  if (s >= 40) return { bg: 'bg-orange-500', text: 'text-orange-700', ring: 'ring-orange-200', label: 'Poor' };
  return { bg: 'bg-red-500', text: 'text-red-700', ring: 'ring-red-200', label: 'Critical' };
}

function metricPill(label, value, good) {
  var color = good ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100';
  var icon = good ? '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' :
    '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
  return '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium border ' + color + '">' + icon + ' ' + esc(label) + (value !== undefined ? ': ' + esc(String(value)) : '') + '</span>';
}

function parseAnalysis(text) {
  if (!text) return '';
  // Convert markdown-ish analysis to HTML
  var html = esc(text)
    .replace(/^#{1,3}\s*(.+)/gm, '<h4 class="font-bold text-gray-800 mt-4 mb-2">$1</h4>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\s*[-*•]\s+(.+)/gm, '<li class="ml-4 text-sm text-gray-600 py-0.5">$1</li>')
    .replace(/^\d+\.\s+(.+)/gm, '<li class="ml-4 text-sm text-gray-600 py-0.5 list-decimal">$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
  return '<div class="prose-sm leading-relaxed">' + html + '</div>';
}

function renderAudits(audits) {
  // Stats bar
  var completed = audits.filter(function(a) { return a.status === 'completed'; });
  var avgScore = completed.length > 0 ? Math.round(completed.reduce(function(s, a) { return s + (a.score || 0); }, 0) / completed.filter(function(a) { return a.score; }).length) || 0 : 0;

  var statsBar = '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">' +
    '<div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-400 uppercase tracking-wider">Total Audits</p><p class="text-2xl font-bold mt-1">' + audits.length + '</p></div>' +
    '<div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-400 uppercase tracking-wider">Completed</p><p class="text-2xl font-bold text-green-600 mt-1">' + completed.length + '</p></div>' +
    '<div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-400 uppercase tracking-wider">Failed</p><p class="text-2xl font-bold text-red-500 mt-1">' + audits.filter(function(a) { return a.status === 'failed'; }).length + '</p></div>' +
    '<div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-400 uppercase tracking-wider">Avg Score</p><p class="text-2xl font-bold text-indigo-600 mt-1">' + (avgScore || '-') + '<span class="text-sm text-gray-400 font-normal">/100</span></p></div>' +
  '</div>';

  var cards = audits.map(function(a) {
    var statusColor = a.status === 'completed' ? 'bg-green-100 text-green-700' : a.status === 'failed' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
    var m = a.metrics || {};

    // Score ring
    var scoreRing = '';
    if (a.score) {
      var sc = scoreColor(a.score);
      scoreRing = '<div class="flex-shrink-0 w-16 h-16 rounded-full ring-4 ' + sc.ring + ' ' + sc.bg + ' flex items-center justify-center">' +
        '<span class="text-white font-bold text-lg">' + a.score + '</span></div>';
    }

    // Health checks
    var checks = [];
    if (m.title) checks.push(metricPill('Title Tag', undefined, true));
    else checks.push(metricPill('Title Tag', 'Missing', false));
    if (m.metaDescription) checks.push(metricPill('Meta Desc', undefined, true));
    else checks.push(metricPill('Meta Desc', 'Missing', false));
    if (m.hasViewport) checks.push(metricPill('Mobile', undefined, true));
    else checks.push(metricPill('Mobile', 'No viewport', false));
    if (m.isHttps) checks.push(metricPill('HTTPS', undefined, true));
    else checks.push(metricPill('HTTPS', 'Not secure', false));
    if (m.h1 && m.h1.length === 1) checks.push(metricPill('H1', undefined, true));
    else if (m.h1 && m.h1.length > 1) checks.push(metricPill('H1', m.h1.length + ' found', false));
    else checks.push(metricPill('H1', 'Missing', false));
    if (m.ogTitle) checks.push(metricPill('OG Tags', undefined, true));
    else checks.push(metricPill('OG Tags', 'Missing', false));
    if (m.totalImages > 0 && m.imagesWithoutAlt === 0) checks.push(metricPill('Alt Tags', undefined, true));
    else if (m.imagesWithoutAlt > 0) checks.push(metricPill('Alt Tags', m.imagesWithoutAlt + ' missing', false));

    // Performance metrics
    var perfItems = '';
    if (m.loadTimeMs) {
      var loadGood = m.loadTimeMs < 3000;
      perfItems += '<div class="flex items-center justify-between py-1.5"><span class="text-xs text-gray-500">Load Time</span><span class="text-xs font-semibold ' + (loadGood ? 'text-green-600' : 'text-red-600') + '">' + (m.loadTimeMs / 1000).toFixed(1) + 's</span></div>';
    }
    if (m.htmlSize) perfItems += '<div class="flex items-center justify-between py-1.5"><span class="text-xs text-gray-500">Page Size</span><span class="text-xs font-semibold text-gray-700">' + (m.htmlSize / 1024).toFixed(0) + ' KB</span></div>';
    if (m.totalImages) perfItems += '<div class="flex items-center justify-between py-1.5"><span class="text-xs text-gray-500">Images</span><span class="text-xs font-semibold text-gray-700">' + m.totalImages + '</span></div>';
    if (m.totalLinks) perfItems += '<div class="flex items-center justify-between py-1.5"><span class="text-xs text-gray-500">Links</span><span class="text-xs font-semibold text-gray-700">' + m.totalLinks + ' (' + m.externalLinks + ' external)</span></div>';
    if (m.bodyTextLength) perfItems += '<div class="flex items-center justify-between py-1.5"><span class="text-xs text-gray-500">Content</span><span class="text-xs font-semibold text-gray-700">' + Math.round(m.bodyTextLength / 100) * 100 + ' chars</span></div>';
    if (m.h2Count) perfItems += '<div class="flex items-center justify-between py-1.5"><span class="text-xs text-gray-500">H2 Headings</span><span class="text-xs font-semibold text-gray-700">' + m.h2Count + '</span></div>';

    return '<div class="bg-white rounded-2xl border shadow-sm overflow-hidden">' +
      // Header
      '<div class="p-5 border-b">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<div class="flex items-center gap-3">' +
            scoreRing +
            '<div>' +
              '<a href="' + esc(a.url) + '" target="_blank" class="font-bold text-indigo-600 hover:underline text-sm">' + esc(a.url) + '</a>' +
              '<p class="text-xs text-gray-400 mt-0.5">' + esc(a.user_name || a.user_phone) + ' - ' + fmtDate(a.created_at) + '</p>' +
            '</div>' +
          '</div>' +
          '<span class="badge ' + statusColor + '">' + esc(a.status) + '</span>' +
        '</div>' +
        (m.title ? '<p class="text-sm text-gray-700 mb-1"><span class="text-xs text-gray-400">Title:</span> ' + esc(m.title) + '</p>' : '') +
        (m.metaDescription ? '<p class="text-xs text-gray-500 line-clamp-2">' + esc(m.metaDescription) + '</p>' : '') +
      '</div>' +

      // Health checks
      '<div class="px-5 py-3 bg-gray-50 border-b">' +
        '<div class="flex flex-wrap gap-2">' + checks.join('') + '</div>' +
      '</div>' +

      // Metrics + Analysis
      '<div class="p-5">' +
        (perfItems ? '<div class="mb-4 p-3 bg-gray-50 rounded-xl divide-y divide-gray-100">' + perfItems + '</div>' : '') +
        // Collapsible analysis
        (a.analysis ? '<details class="group"><summary class="cursor-pointer text-sm font-semibold text-indigo-600 hover:text-indigo-800 flex items-center gap-1 mb-2">View Full Analysis <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></summary>' +
          '<div class="mt-2 p-4 bg-gray-50 rounded-xl max-h-96 overflow-y-auto text-sm text-gray-700 leading-relaxed">' + parseAnalysis(a.analysis) + '</div></details>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<h2 class="text-2xl font-bold mb-6">SEO Audits</h2>' +
    statsBar +
    '<div class="grid lg:grid-cols-2 gap-6">' + (cards || '<div class="col-span-2 text-center text-gray-400 py-12">No audits yet</div>') + '</div>' +
  '</div>';
}

function statusBadgeClass(status) {
  if (status === 'confirmed') return 'bg-green-100 text-green-700';
  if (status === 'cancelled') return 'bg-red-100 text-red-700';
  return 'bg-yellow-100 text-yellow-700';
}

function filteredMeetings() {
  var q = meetingsSearch.toLowerCase();
  return (meetingsData || []).filter(function(m) {
    if (meetingsStatusFilter !== 'all' && m.status !== meetingsStatusFilter) return false;
    if (!q) return true;
    return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
      (m.phone_number || '').toLowerCase().indexOf(q) !== -1 ||
      (m.topic || '').toLowerCase().indexOf(q) !== -1;

// Dashboard button handler: open the Calendly/Meet join URL in a new tab
// AND email the same link to the lead (re-send for reminder value). One
// click, two outcomes — the admin is never left wondering whether the email
// went out. Uses alerts for feedback to match the rest of the dashboard.
function openAndEmailMeetingLink(meetingId) {
  var meeting = (meetingsData || []).find(function(m) { return m.id === meetingId; });
  if (!meeting) { alert('Meeting not found — try refreshing.'); return; }
  // Open the meeting immediately so browsers don't block the popup (user
  // initiated click). The email fires in parallel.
  if (meeting.join_url) window.open(meeting.join_url, '_blank', 'noopener');
  fetch('/admin/api/meetings/' + encodeURIComponent(meetingId) + '/send-link', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  })
    .then(function(res) { return res.json().then(function(body) { return { ok: res.ok, body: body }; }); })
    .then(function(r) {
      if (r.ok) {
        alert('Meeting link emailed to ' + (r.body.sentTo || meeting.invitee_email) + '.');
      } else {
        alert('Email failed: ' + ((r.body && r.body.error) || 'Unknown error'));
      }
    })
    .catch(function(err) { alert('Email request failed: ' + err.message); });
}

function closeMeetingModal() {
  var modal = document.getElementById('meeting-modal');
  if (modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
}
