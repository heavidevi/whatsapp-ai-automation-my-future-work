// Parse lead brief into structured HTML
function parseBrief(brief) {
  if (!brief) return '';
  // Strip markdown bold markers
  var text = brief.replace(/\*\*/g, '');

  // All known field keys in order (used to build a lookahead pattern)
  var fieldKeys = [
    'Lead Name', 'Lead name', 'Business Name', 'Business name', 'Industry',
    'Website URL', 'Current Website', 'Service Needed', 'Service needed',
    'Main Pain Point', 'Pain Point / Goal', 'Pain Point',
    'Budget Range', 'Budget range', 'Budget',
    'Timeline', 'Package Discussed', 'Package discussed',
    'Payment Plan', 'Payment plan requested', 'Payment Plan Requested',
    'Personality Mode', 'Personality mode',
    'Language Used', 'Language used', 'Language',
    'Objections Raised', 'Objections raised',
    'Conversation Summary', 'Recommended Approach for Call', 'Recommended Approach'
  ];

  // Build a lookahead regex that matches any field key
  var keyPattern = fieldKeys.map(function(k) { return k.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&'); }).join('|');
  var lookahead = '(?=' + keyPattern + '\\s*:|$)';

  var fieldDefs = [
    { key: 'Lead [Nn]ame', label: 'Name', icon: '👤' },
    { key: 'Business [Nn]ame', label: 'Business', icon: '🏢' },
    { key: 'Industry', label: 'Industry', icon: '🏭' },
    { key: 'Website URL|Current Website', label: 'Website', icon: '🌐' },
    { key: 'Service [Nn]eeded', label: 'Service', icon: '🎯' },
    { key: 'Main Pain Point|Pain Point \\/ Goal|Pain Point', label: 'Goal', icon: '⚡' },
    { key: 'Budget [Rr]ange|Budget', label: 'Budget', icon: '💰' },
    { key: 'Timeline', label: 'Timeline', icon: '📅' },
    { key: 'Package [Dd]iscussed', label: 'Package', icon: '📦' },
    { key: 'Payment [Pp]lan[^:]*', label: 'Payment Plan', icon: '💳' },
    { key: 'Personality [Mm]ode', label: 'Personality', icon: '🎭' },
    { key: 'Language [Uu]sed|Language', label: 'Language', icon: '🗣️' },
    { key: 'Objections [Rr]aised', label: 'Objections', icon: '🤔' },
  ];

  var extracted = {};

  fieldDefs.forEach(function(f) {
    var regex = new RegExp('(?:' + f.key + ')\\s*:\\s*(.+?)\\s*' + lookahead, 'i');
    var match = text.match(regex);
    if (match) {
      var val = match[1].trim();
      if (val && val !== 'N/A' && val !== 'None' && val !== 'none' && val !== '-') {
        extracted[f.label] = { value: val, icon: f.icon };
      }
    }
  });

  // Extract conversation summary / recommended approach (everything after it)
  var summaryRegex = /(?:Conversation Summary|Recommended Approach[^:]*)\s*:\s*([\s\S]+)/i;
  var summaryMatch = text.match(summaryRegex);
  var summary = summaryMatch ? summaryMatch[1].trim() : '';

  // Build the grid
  var gridItems = Object.keys(extracted).map(function(label) {
    var item = extracted[label];
    return '<div class="flex items-start gap-2.5 py-2.5 px-1">' +
      '<span class="text-base">' + item.icon + '</span>' +
      '<div><p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold mb-0.5">' + esc(label) + '</p>' +
      '<p class="text-sm font-medium text-gray-800">' + esc(item.value) + '</p></div></div>';
  }).join('');

  var html = '';
  if (gridItems) {
    html += '<div class="grid grid-cols-2 gap-x-6 divide-y divide-gray-50">' + gridItems + '</div>';
  }

  if (summary) {
    html += '<div class="mt-3 pt-3 border-t border-amber-100">' +
      '<p class="text-[10px] text-amber-600 font-bold uppercase tracking-widest mb-2">Call Notes & Approach</p>' +
      '<p class="text-sm text-gray-700 leading-relaxed">' + esc(summary) + '</p></div>';
  }

  if (!html) {
    // Fallback: just show cleaned text
    html = '<p class="text-sm text-gray-600 leading-relaxed">' + esc(text.trim()) + '</p>';
  }

  return html;
}

function fmtMoney(cents) {
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function renderRevenue(rev, payments) {
  // Revenue by service chart data
  var svcLabels = Object.keys(rev.byService);
  var svcData = svcLabels.map(function(k) { return rev.byService[k] / 100; });
  var svcColors = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#06b6d4', '#ec4899'];

  // Revenue by month chart data
  var monthLabels = Object.keys(rev.byMonth).sort();
  var monthData = monthLabels.map(function(k) { return rev.byMonth[k] / 100; });

  // Recent payments
  var recentPaid = payments.filter(function(p) { return p.status === 'paid'; }).slice(0, 5);
  var recentRows = recentPaid.map(function(p) {
    return '<tr class="border-b hover:bg-gray-50">' +
      '<td class="p-3 text-sm font-medium">' + esc(p.user_name || p.user_phone) + '</td>' +
      '<td class="p-3 text-sm font-bold text-green-600">' + fmtMoney(p.amount) + '</td>' +
      '<td class="p-3"><span class="badge bg-indigo-100 text-indigo-700">' + esc(p.service_type) + '</span></td>' +
      '<td class="p-3 text-xs text-gray-500">' + fmtDate(p.paid_at) + '</td>' +
    '</tr>';
  }).join('');

  var monthChange = rev.revenueLastMonth > 0 ? Math.round(((rev.revenueThisMonth - rev.revenueLastMonth) / rev.revenueLastMonth) * 100) : (rev.revenueThisMonth > 0 ? 100 : 0);
  var changeClass = monthChange >= 0 ? 'text-green-600' : 'text-red-600';
  var changeIcon = monthChange >= 0 ? '↑' : '↓';

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<div class="flex items-center justify-between mb-6"><h2 class="text-2xl font-bold">Revenue Dashboard</h2>' +
    '<button onclick="syncPayments()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">Sync Payments</button></div>' +

    // Metric cards
    '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total Revenue</p><p class="text-2xl font-bold text-green-600">' + fmtMoney(rev.totalRevenue) + '</p></div>' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">This Month</p><p class="text-2xl font-bold">' + fmtMoney(rev.revenueThisMonth) + '</p><p class="text-xs ' + changeClass + ' mt-1">' + changeIcon + ' ' + Math.abs(monthChange) + '% vs last month</p></div>' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Pending</p><p class="text-2xl font-bold text-yellow-600">' + fmtMoney(rev.pendingAmount) + '</p><p class="text-xs text-gray-400 mt-1">' + rev.totalPending + ' unpaid</p></div>' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Avg Deal Size</p><p class="text-2xl font-bold">' + fmtMoney(rev.avgDealSize) + '</p><p class="text-xs text-gray-400 mt-1">' + rev.totalPaid + ' deals closed</p></div>' +
    '</div>' +

    // Charts row
    '<div class="grid lg:grid-cols-2 gap-6 mb-8">' +
      '<div class="bg-white rounded-xl border p-6"><h3 class="font-bold mb-4">Revenue by Month</h3><canvas id="revenueMonthChart" height="200"></canvas></div>' +
      '<div class="bg-white rounded-xl border p-6"><h3 class="font-bold mb-4">Revenue by Service</h3><canvas id="revenueServiceChart" height="200"></canvas></div>' +
    '</div>' +

    // Recent payments table
    '<div class="bg-white rounded-xl border overflow-hidden"><div class="p-4 border-b"><h3 class="font-bold">Recent Payments</h3></div>' +
      '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b"><tr><th class="text-left p-3 font-semibold">Client</th><th class="text-left p-3 font-semibold">Amount</th><th class="text-left p-3 font-semibold">Service</th><th class="text-left p-3 font-semibold">Paid At</th></tr></thead>' +
      '<tbody>' + (recentRows || '<tr><td colspan="4" class="p-8 text-center text-gray-400">No payments yet</td></tr>') + '</tbody></table></div></div>' +
  '</div>';

  // Render charts
  if (monthLabels.length > 0) {
    new Chart(document.getElementById('revenueMonthChart'), {
      type: 'bar', data: { labels: monthLabels, datasets: [{ label: 'Revenue ($)', data: monthData, backgroundColor: '#6366f1', borderRadius: 8 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return '$' + v; } } } } }
    });
  }
  if (svcLabels.length > 0) {
    new Chart(document.getElementById('revenueServiceChart'), {
      type: 'doughnut', data: { labels: svcLabels, datasets: [{ data: svcData, backgroundColor: svcColors.slice(0, svcLabels.length), borderWidth: 0 }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  }
}

function syncPayments() {
  var btn = event.target;
  btn.textContent = 'Syncing...';
  btn.disabled = true;
  fetch('/admin/api/payments/sync', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.textContent = 'Synced ' + d.synced + '/' + d.total;
      btn.disabled = false;
      setTimeout(function() { btn.textContent = 'Sync Payments'; loadSection('revenue'); }, 2000);
    })
    .catch(function() { btn.textContent = 'Sync Failed'; btn.disabled = false; });
}

// ─── Payments ──────────────────────────────────
function renderPayments(payments) {
  var rows = payments.map(function(p) {
    var statusColor = p.status === 'paid' ? 'bg-green-100 text-green-700' : p.status === 'expired' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
    return '<tr class="border-b hover:bg-gray-50">' +
      '<td class="p-3 text-sm font-medium">' + esc(p.user_name || p.user_phone || '-') + '</td>' +
      '<td class="p-3 font-mono text-xs">' + esc(p.user_phone) + '</td>' +
      '<td class="p-3 text-sm font-bold">' + fmtMoney(p.amount) + '</td>' +
      '<td class="p-3"><span class="badge ' + statusColor + '">' + p.status + '</span></td>' +
      '<td class="p-3"><span class="badge bg-indigo-100 text-indigo-700">' + esc(p.service_type) + '</span></td>' +
      '<td class="p-3"><span class="badge bg-gray-100 text-gray-600">' + esc(p.package_tier) + '</span></td>' +
      '<td class="p-3 text-xs text-gray-500 max-w-xs truncate">' + esc(p.description) + '</td>' +
      '<td class="p-3 text-xs text-gray-500">' + (p.paid_at ? fmtDate(p.paid_at) : fmtDate(p.created_at)) + '</td>' +
      '<td class="p-3">' + (p.stripe_payment_link_url ? '<a href="' + esc(p.stripe_payment_link_url) + '" target="_blank" class="text-indigo-600 hover:underline text-xs">Link</a>' : '-') + '</td>' +
    '</tr>';
  }).join('');

  var totalPaid = payments.filter(function(p) { return p.status === 'paid'; }).reduce(function(s, p) { return s + p.amount; }, 0);
  var totalPending = payments.filter(function(p) { return p.status === 'pending'; }).reduce(function(s, p) { return s + p.amount; }, 0);

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<div class="flex items-center justify-between mb-6"><h2 class="text-2xl font-bold">Payments (' + payments.length + ')</h2>' +
    '<div class="flex gap-4"><span class="text-sm text-green-600 font-bold">Paid: ' + fmtMoney(totalPaid) + '</span><span class="text-sm text-yellow-600 font-bold">Pending: ' + fmtMoney(totalPending) + '</span></div></div>' +
    '<div class="bg-white rounded-xl border overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">' +
      '<thead class="bg-gray-50 border-b"><tr><th class="text-left p-3 font-semibold">Client</th><th class="text-left p-3 font-semibold">Phone</th><th class="text-left p-3 font-semibold">Amount</th><th class="text-left p-3 font-semibold">Status</th><th class="text-left p-3 font-semibold">Service</th><th class="text-left p-3 font-semibold">Tier</th><th class="text-left p-3 font-semibold">Description</th><th class="text-left p-3 font-semibold">Date</th><th class="text-left p-3 font-semibold">Link</th></tr></thead>' +
      '<tbody>' + (rows || '<tr><td colspan="9" class="p-8 text-center text-gray-400">No payments yet</td></tr>') + '</tbody>' +
    '</table></div></div>' +
  '</div>';
}

// ─── Feedback ─────────────────────────────────
// User-submitted ratings after project delivery + friction signals
// the bot detected implicitly (frustration, correction loops, rapid
// resets, help-escape). Visual tier matches the user's priority —
// implicit rows get red accent (actionable friction), explicit
// "issues" get yellow, explicit "loved/good" get green.
function setFeedbackFilter(key, value) {
  fbFilters[key] = value;
  loadSection('feedback');
}

function fbRatingBadge(r) {
  if (r === 'loved') return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-green-100 text-green-700">🔥 Loved</span>';
  if (r === 'good') return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-blue-100 text-blue-700">👍 Good</span>';
  if (r === 'issues') return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-amber-100 text-amber-700">🤔 Issues</span>';
  return '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-gray-100 text-gray-600">—</span>';
}

function fbTriggerLabel(t) {
  var map = {
    'delivery-prompt': 'Post-delivery rating',
    'frustrated-phrasing': 'Frustrated phrasing',
    'correction-loop': 'Correction loop',
    'rapid-reset': 'Rapid reset',
    'help-escape': 'Asked for human',
    'admin-requested': 'Admin-requested',
  };
  return map[t] || t;
}

function renderFeedbackCard(row) {
  // Visual priority: implicit rows = red accent (most actionable),
  // explicit issues = yellow, explicit loved/good = green.
  var accent = 'border-gray-200';
  if (row.source === 'implicit') accent = 'border-l-[4px] border-l-red-500 border-red-200';
  else if (row.rating === 'issues') accent = 'border-l-[4px] border-l-amber-500 border-amber-200';
  else if (row.rating === 'loved' || row.rating === 'good') accent = 'border-l-[4px] border-l-green-500 border-green-200';

  var who = row.user_name || row.phone_number || '—';
  var comment = row.comment
    ? '<div class="mt-2 text-sm text-gray-700 whitespace-pre-wrap bg-gray-50 rounded-md px-3 py-2">' + esc(row.comment) + '</div>'
    : '';

  var excerpt = '';
  if (Array.isArray(row.excerpt) && row.excerpt.length) {
    var lines = row.excerpt.slice(-4).map(function(m) {
      var tag = m.role === 'user' ? '<span class="text-indigo-600 font-semibold">user</span>' : '<span class="text-gray-500">bot</span>';
      return '<div class="text-xs text-gray-600">' + tag + ': ' + esc(String(m.text || '').slice(0, 120)) + '</div>';
    }).join('');
    excerpt = '<div class="mt-2 pt-2 border-t border-gray-100 space-y-0.5">' + lines + '</div>';
  }

  var resolved = row.resolved
    ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-green-100 text-green-700">Resolved</span>'
    : '<button onclick="resolveFeedback(\'' + row.id + '\', true)" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">Mark resolved</button>';

  return '<div class="bg-white rounded-xl border ' + accent + ' p-4">' +
    '<div class="flex items-start justify-between gap-3">' +
      '<div class="min-w-0">' +
        '<div class="flex items-center gap-2 flex-wrap">' +
          fbRatingBadge(row.rating) +
          '<span class="text-xs text-gray-500">' + esc(fbTriggerLabel(row.trigger_type)) + '</span>' +
          '<span class="text-xs text-gray-400">&middot;</span>' +
          '<span class="text-xs text-gray-500">' + esc(row.flow || 'general') + '</span>' +
        '</div>' +
        '<div class="mt-1 font-semibold text-sm">' + esc(who) + '</div>' +
        '<div class="text-xs text-gray-500">' + esc(row.phone_number || '') + ' · ' + timeAgo(row.created_at) + '</div>' +
        comment +
        excerpt +
      '</div>' +
      '<div class="flex flex-col items-end gap-2 shrink-0">' +
        '<button onclick="openConversation(\'' + row.user_id + '\', \'' + esc(row.phone_number || '') + '\', \'' + esc(who) + '\')" class="text-xs px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-md font-medium">Open chat</button>' +
        resolved +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderFeedback(data) {
  var s = data.summary || {};
  var rows = data.rows || [];

  function filterChip(label, key, val) {
    var active = fbFilters[key] === val;
    return '<button onclick="setFeedbackFilter(\'' + key + '\', \'' + val + '\')" class="' +
      (active
        ? 'px-3 py-1.5 text-xs font-medium rounded-lg bg-indigo-600 text-white'
        : 'px-3 py-1.5 text-xs font-medium rounded-lg bg-white text-gray-600 border hover:bg-gray-50') +
      '">' + esc(label) + '</button>';
  }

  var html = '<div class="flex items-center justify-between mb-6">' +
    '<h2 class="text-2xl font-bold">Feedback</h2>' +
    '<button onclick="loadSection(\'feedback\')" class="text-sm text-indigo-600 hover:text-indigo-800">Refresh</button>' +
  '</div>' +

  // Summary cards
  '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">' +
    '<div class="bg-white rounded-xl border p-4"><p class="text-2xl font-bold">' + (s.total || 0) + '</p><p class="text-xs text-gray-500">Total</p></div>' +
    '<div class="bg-white rounded-xl border-l-4 border-red-500 p-4"><p class="text-2xl font-bold">' + (s.implicit || 0) + '</p><p class="text-xs text-gray-500">Implicit (friction)</p></div>' +
    '<div class="bg-white rounded-xl border-l-4 border-amber-500 p-4"><p class="text-2xl font-bold">' + (s.issues || 0) + '</p><p class="text-xs text-gray-500">Issues reported</p></div>' +
    '<div class="bg-white rounded-xl border-l-4 border-green-500 p-4"><p class="text-2xl font-bold">' + ((s.loved || 0) + (s.good || 0)) + '</p><p class="text-xs text-gray-500">Positive ratings</p></div>' +
  '</div>' +

  // Filter bar
  '<div class="bg-white rounded-xl border p-3 mb-4 space-y-2">' +
    '<div class="flex items-center gap-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 font-semibold mr-1">Source:</span>' +
      filterChip('All', 'source', 'all') +
      filterChip('Implicit', 'source', 'implicit') +
      filterChip('Explicit', 'source', 'explicit') +
    '</div>' +
    '<div class="flex items-center gap-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 font-semibold mr-1">Rating:</span>' +
      filterChip('All', 'rating', 'all') +
      filterChip('🔥 Loved', 'rating', 'loved') +
      filterChip('👍 Good', 'rating', 'good') +
      filterChip('🤔 Issues', 'rating', 'issues') +
    '</div>' +
    '<div class="flex items-center gap-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 font-semibold mr-1">Flow:</span>' +
      filterChip('All', 'flow', 'all') +
      filterChip('Website', 'flow', 'website') +
      filterChip('Logo', 'flow', 'logo') +
      filterChip('Ad', 'flow', 'ad') +
      filterChip('Chatbot', 'flow', 'chatbot') +
      filterChip('SEO', 'flow', 'seo') +
      filterChip('General', 'flow', 'general') +
    '</div>' +
    '<div class="flex items-center gap-2 flex-wrap">' +
      '<span class="text-xs text-gray-500 font-semibold mr-1">Status:</span>' +
      filterChip('All', 'resolved', 'all') +
      filterChip('Open', 'resolved', 'open') +
      filterChip('Resolved', 'resolved', 'resolved') +
    '</div>' +
  '</div>';

  if (rows.length === 0) {
    html += '<div class="bg-white rounded-xl border p-8 text-center text-gray-500">No feedback matches the current filters yet.</div>';
  } else {
    html += '<div class="space-y-3">' + rows.map(renderFeedbackCard).join('') + '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

function resolveFeedback(id, resolved) {
  fetch('/admin/api/feedback/' + id + '/resolve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ resolved: !!resolved }),
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.success) loadSection('feedback');
    else alert('Failed: ' + (d.error || 'unknown error'));
  });
}

// ─── Ad Attribution ───────────────────────────
// Change the lookback window and reload. adAttrWindow is global (top of file).
// 0 means all-time; numeric values are days.
function setAdAttrWindow(days) {
  adAttrWindow = days;
  loadSection('adattribution');
}

function renderAdAttribution(data) {
  var totals = data.totals || {};
  var byCreative = data.byCreative || [];
  var byChannel = data.byChannel || {};
  var bySource = data.bySource || {};

  function windowTab(days, label) {
    var active = adAttrWindow === days;
    return '<button onclick="setAdAttrWindow(' + days + ')" class="px-3 py-1.5 text-xs font-medium rounded-lg transition ' +
      (active ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200') + '">' + label + '</button>';
  }

  var topBar =
    '<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">' +
      '<div>' +
        '<h2 class="text-2xl font-bold">Ad Attribution</h2>' +
        '<p class="text-sm text-gray-500 mt-1">Which ad creatives bring leads that actually close. Lower cost-per-close = cheaper customer acquisition.</p>' +
      '</div>' +
      '<div class="flex flex-wrap gap-2">' + windowTab(7, '7 days') + windowTab(30, '30 days') + windowTab(90, '90 days') + windowTab(0, 'All time') +
      '<button onclick="loadSection(\'adattribution\')" class="text-sm text-indigo-600 hover:text-indigo-800 ml-1 sm:ml-3 self-center">Refresh</button></div>' +
    '</div>';

  var summaryCards =
    '<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 mb-1">Ad Leads</p><p class="text-2xl font-bold">' + (totals.leads || 0) + '</p><p class="text-xs text-gray-400 mt-2">Across ' + (totals.creatives || 0) + ' creatives</p></div>' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 mb-1">Closes</p><p class="text-2xl font-bold text-green-600">' + (totals.closes || 0) + '</p><p class="text-xs text-gray-400 mt-2">Close rate: ' + (totals.closeRatePct || '0') + '%</p></div>' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 mb-1">Revenue</p><p class="text-2xl font-bold text-green-600">' + fmtMoney(totals.revenueCents || 0) + '</p><p class="text-xs text-gray-400 mt-2">Attributed to ad leads</p></div>' +
      '<div class="bg-white rounded-xl border p-5"><p class="text-xs text-gray-500 mb-1">Avg Revenue / Close</p><p class="text-2xl font-bold">' + fmtMoney((totals.closes > 0 ? (totals.revenueCents / totals.closes) : 0)) + '</p><p class="text-xs text-gray-400 mt-2">Per closed ad lead</p></div>' +
    '</div>';

  // Roll-up cards: by source (web/seo/smm/...) and by channel (WA/Messenger/IG)
  function rollupCard(title, map) {
    var keys = Object.keys(map).sort(function(a, b) { return map[b].revenueCents - map[a].revenueCents; });
    if (keys.length === 0) {
      return '<div class="bg-white rounded-xl border p-5"><h3 class="font-semibold mb-3">' + esc(title) + '</h3><p class="text-sm text-gray-400">No data</p></div>';
    }
    var rows = keys.map(function(k) {
      var v = map[k];
      var rate = v.leads > 0 ? ((v.closes / v.leads) * 100).toFixed(1) : '0';
      return '<div class="flex items-center justify-between py-2 border-b last:border-0">' +
        '<div class="flex-1"><span class="badge bg-indigo-100 text-indigo-700 mr-2">' + esc(k) + '</span><span class="text-xs text-gray-500">' + v.leads + ' leads · ' + v.closes + ' closes · ' + rate + '%</span></div>' +
        '<span class="font-semibold text-sm">' + fmtMoney(v.revenueCents) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="bg-white rounded-xl border p-5"><h3 class="font-semibold mb-3">' + esc(title) + '</h3>' + rows + '</div>';
  }

  var rollups =
    '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">' +
      rollupCard('By Ad Source', bySource) +
      rollupCard('By Channel', byChannel) +
    '</div>';

  // Main creative-level table sorted by revenue DESC.
  var rows = byCreative.map(function(c) {
    var rate = parseFloat(c.closeRatePct || '0');
    var rateColor = rate >= 10 ? 'text-green-600' : rate >= 3 ? 'text-yellow-600' : 'text-gray-500';
    var headlineText = c.headline ? esc(c.headline) : '<span class="text-gray-400 italic">(no headline captured)</span>';
    var sourceIdText = c.sourceId ? '<div class="text-[10px] text-gray-400 font-mono mt-1 truncate max-w-[220px]" title="' + esc(c.sourceId) + '">' + esc(c.sourceId) + '</div>' : '';
    return '<tr class="border-b hover:bg-gray-50">' +
      '<td class="p-3 text-xs"><span class="badge bg-indigo-100 text-indigo-700">' + esc(c.adSource) + '</span></td>' +
      '<td class="p-3 text-xs"><span class="badge bg-gray-100 text-gray-700">' + esc(c.platform) + '</span></td>' +
      '<td class="p-3 text-sm max-w-md"><div class="font-medium truncate" title="' + esc(c.headline || '') + '">' + headlineText + '</div>' + sourceIdText + '</td>' +
      '<td class="p-3 text-sm font-semibold text-center">' + c.leads + '</td>' +
      '<td class="p-3 text-sm font-semibold text-center text-green-600">' + c.closes + '</td>' +
      '<td class="p-3 text-sm font-semibold text-center ' + rateColor + '">' + c.closeRatePct + '%</td>' +
      '<td class="p-3 text-sm font-bold text-right text-green-700">' + fmtMoney(c.revenueCents) + '</td>' +
      '<td class="p-3 text-xs text-gray-500 text-right">' + fmtMoney(c.avgRevenueCents) + '</td>' +
      '<td class="p-3 text-xs text-gray-400">' + fmtDate(c.lastSeenAt) + '</td>' +
    '</tr>';
  }).join('');

  var table =
    '<div class="bg-white rounded-xl border overflow-hidden">' +
      '<div class="px-5 py-3 border-b bg-gray-50 flex items-center justify-between">' +
        '<h3 class="font-semibold">Creative Performance</h3>' +
        '<p class="text-xs text-gray-500">Sorted by revenue. Kill the bottom; scale the top.</p>' +
      '</div>' +
      '<div class="overflow-x-auto"><table class="w-full text-sm">' +
        '<thead class="bg-gray-50 border-b"><tr>' +
          '<th class="text-left p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Source</th>' +
          '<th class="text-left p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Channel</th>' +
          '<th class="text-left p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Headline</th>' +
          '<th class="text-center p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Leads</th>' +
          '<th class="text-center p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Closes</th>' +
          '<th class="text-center p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Close %</th>' +
          '<th class="text-right p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Revenue</th>' +
          '<th class="text-right p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Avg $/Close</th>' +
          '<th class="text-left p-3 font-semibold text-xs uppercase tracking-wide text-gray-600">Last Seen</th>' +
        '</tr></thead>' +
        '<tbody>' + (rows || '<tr><td colspan="9" class="p-8 text-center text-gray-400">No ad-attributed leads in this window. Check back after your next Meta Ads campaign runs.</td></tr>') + '</tbody>' +
      '</table></div>' +
    '</div>';

  document.getElementById('content').innerHTML = '<div class="fade-in">' + topBar + summaryCards + rollups + table + '</div>';
}

// ─── Sales Prep ───────────────────────────────
function renderSalesPrep(leads) {
  // Filter to only leads worth showing (have some activity)
  var active = leads.filter(function(l) { return l.total_messages > 2; });

  // Sort: qualified/closed first, then by last activity
  active.sort(function(a, b) {
    var scoreA = (a.is_closed ? 3 : 0) + (a.is_qualified ? 2 : 0) + (a.payment_confirmed ? 4 : 0);
    var scoreB = (b.is_closed ? 3 : 0) + (b.is_qualified ? 2 : 0) + (b.payment_confirmed ? 4 : 0);
    if (scoreB !== scoreA) return scoreB - scoreA;
    return new Date(b.last_activity) - new Date(a.last_activity);
  });

  var cards = active.map(function(lead) {
    // Status badge
    var statusBadge = '';
    if (lead.payment_confirmed) statusBadge = '<span class="badge bg-green-100 text-green-700">Paid</span>';
    else if (lead.is_closed) statusBadge = '<span class="badge bg-blue-100 text-blue-700">Closed</span>';
    else if (lead.is_qualified) statusBadge = '<span class="badge bg-yellow-100 text-yellow-700">Qualified</span>';
    else statusBadge = '<span class="badge bg-gray-100 text-gray-500">Open</span>';

    var tempLabel = lead.lead_temperature ? tempBadge(lead.lead_temperature) : '';
    var closingLabel = lead.closing_technique && lead.closing_technique !== 'N/A'
      ? '<span class="badge bg-purple-50 text-purple-600" title="Closing technique used">' + esc(lead.closing_technique) + '</span>'
      : '';

    // Topics
    var topicBadges = lead.topics_discussed.map(function(t) {
      return '<span class="badge bg-indigo-50 text-indigo-600">' + esc(t) + '</span>';
    }).join(' ');

    // Lead brief section - parse the structured brief into a clean card
    var briefSection = '';
    if (lead.lead_brief) {
      briefSection = '<div class="mt-4 rounded-xl border border-amber-100 overflow-hidden">' +
        '<div class="px-4 py-3 bg-amber-50 border-b border-amber-100 flex items-center justify-between"><h4 class="font-semibold text-amber-800 text-sm">Lead Brief</h4>' +
        '<button onclick="regenerateSummary(\'' + lead.id + '\', this)" class="text-xs text-amber-600 hover:text-amber-800 font-medium">Regenerate</button></div>' +
        '<div class="p-4 bg-white">' + parseBrief(lead.lead_brief) + '</div>' +
      '</div>';
    } else if (lead.total_messages >= 4) {
      briefSection = '<div class="mt-4 rounded-xl border border-dashed border-amber-200 p-4 text-center" id="brief-' + lead.id + '">' +
        '<p class="text-sm text-gray-400 mb-2">No summary generated yet</p>' +
        '<button onclick="regenerateSummary(\'' + lead.id + '\', this)" class="px-4 py-2 bg-amber-500 text-white rounded-lg text-sm font-medium hover:bg-amber-600 transition-colors">Generate AI Summary</button>' +
      '</div>';
    }

    // Meetings section
    var meetingSection = '';
    if (lead.meetings.length > 0) {
      var meetingRows = lead.meetings.filter(function(m) {
        // Only show meetings with actual date/time info
        return m.date || m.time;
      }).map(function(m) {
        var mStatusColor = m.status === 'confirmed' ? 'bg-green-100 text-green-700' : m.status === 'cancelled' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
        var dateTime = [m.date, m.time, m.timezone].filter(Boolean).join(' - ');
        // Filter out summaries that are actually lead briefs dumped into the wrong field
        var cleanSummary = (m.summary && !m.summary.includes('Lead Name') && !m.summary.includes('**')) ? m.summary : '';
        return '<div class="p-3 bg-white rounded-lg border border-blue-50 mb-2 last:mb-0">' +
          '<div class="flex items-center justify-between mb-1">' +
            '<div class="flex items-center gap-2"><svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span class="font-semibold text-sm text-gray-800">' + esc(dateTime) + '</span></div>' +
            '<span class="badge ' + mStatusColor + '">' + esc(m.status) + '</span>' +
          '</div>' +
          (m.topic ? '<p class="text-xs text-gray-600 mt-1">Topic: <span class="font-medium">' + esc(m.topic) + '</span></p>' : '') +
          (cleanSummary ? '<p class="text-xs text-gray-500 italic mt-1">' + esc(cleanSummary) + '</p>' : '') +
        '</div>';
      }).join('');
      if (meetingRows) {
        meetingSection = '<div class="mt-4 rounded-xl border border-blue-100 overflow-hidden">' +
          '<div class="px-4 py-3 bg-blue-50 border-b border-blue-100"><h4 class="font-semibold text-blue-800 text-sm">Meetings</h4></div>' +
          '<div class="p-3">' + meetingRows + '</div></div>';
      }
    }

    // Payments section
    var paymentSection = '';
    if (lead.payments.length > 0) {
      var paymentRows = lead.payments.map(function(p) {
        var pStatusColor = p.status === 'paid' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700';
        return '<div class="p-3 bg-white rounded-lg border border-green-50 mb-2 last:mb-0">' +
          '<div class="flex items-center justify-between">' +
            '<div class="flex items-center gap-2"><svg class="w-4 h-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8V7m0 10v1"/></svg><span class="font-bold text-sm text-gray-800">' + fmtMoney(p.amount) + '</span></div>' +
            '<span class="badge ' + pStatusColor + '">' + esc(p.status) + '</span>' +
          '</div>' +
          '<p class="text-xs text-gray-600 mt-1">' + esc(p.description || p.service || '') + (p.tier ? ' (' + esc(p.tier) + ')' : '') + '</p>' +
          (p.paid_at ? '<p class="text-xs text-gray-400 mt-1">Paid ' + fmtDate(p.paid_at) + '</p>' : '') +
        '</div>';
      }).join('');
      paymentSection = '<div class="mt-4 rounded-xl border border-green-100 overflow-hidden">' +
        '<div class="px-4 py-3 bg-green-50 border-b border-green-100"><h4 class="font-semibold text-green-800 text-sm">Payments</h4></div>' +
        '<div class="p-3">' + paymentRows + '</div></div>';
    }

    // Websites section
    var websiteSection = '';
    if (lead.websites.length > 0) {
      var siteLinks = lead.websites.map(function(s) {
        return '<div class="flex items-center justify-between py-2">' +
          '<a href="' + esc(s.preview_url) + '" target="_blank" class="text-indigo-600 hover:underline text-sm truncate max-w-xs">' + esc(s.preview_url || 'Preview') + '</a>' +
          '<span class="badge ' + (s.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600') + '">' + esc(s.status) + '</span>' +
        '</div>';
      }).join('');
      websiteSection = '<div class="mt-4 p-4 bg-purple-50 rounded-xl border border-purple-100">' +
        '<h4 class="font-semibold text-purple-800 text-sm mb-2">Generated Websites</h4>' + siteLinks + '</div>';
    }

    // Audits section
    var auditSection = '';
    if (lead.audits.length > 0) {
      var auditItems = lead.audits.map(function(a) {
        var aStatusColor = a.status === 'completed' ? 'bg-green-100 text-green-700' : a.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600';
        return '<div class="p-3 bg-white rounded-lg border border-orange-50 mb-2 last:mb-0">' +
          '<div class="flex items-center justify-between gap-2">' +
            '<div class="flex items-center gap-2 min-w-0">' +
              '<svg class="w-4 h-4 text-orange-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' +
              '<span class="text-sm font-medium text-gray-800 truncate">' + esc(a.url) + '</span>' +
            '</div>' +
            '<span class="badge ' + aStatusColor + ' flex-shrink-0">' + esc(a.status) + '</span>' +
          '</div>' +
          (a.summary ? '<p class="text-xs text-gray-500 mt-2 line-clamp-2 leading-relaxed">' + esc(a.summary.slice(0, 150)) + '…</p>' : '') +
        '</div>';
      }).join('');
      auditSection = '<div class="mt-4 rounded-xl border border-orange-100 overflow-hidden">' +
        '<div class="px-4 py-3 bg-orange-50 border-b border-orange-100"><h4 class="font-semibold text-orange-800 text-sm">SEO Audits</h4></div>' +
        '<div class="p-3">' + auditItems + '</div></div>';
    }

    // Last messages preview
    var lastMsgSection = '<div class="mt-4 p-4 bg-gray-50 rounded-xl border border-gray-100">' +
      '<h4 class="font-semibold text-gray-700 text-sm mb-2">Last Messages</h4>' +
      (lead.last_user_message ? '<div class="mb-2"><span class="text-xs text-gray-400">Client:</span><p class="text-sm text-gray-800 bg-green-50 rounded-lg p-2 mt-1">' + esc(lead.last_user_message) + '</p></div>' : '') +
      (lead.last_bot_message ? '<div><span class="text-xs text-gray-400">Bot:</span><p class="text-sm text-gray-600 bg-gray-100 rounded-lg p-2 mt-1">' + esc(lead.last_bot_message) + '</p></div>' : '') +
    '</div>';

    // View full chat button
    var chatBtn = '<button onclick="openConversation(\'' + lead.id + '\', \'' + esc(lead.phone_number) + '\', \'' + esc(lead.name || '') + '\')" class="mt-4 w-full py-2.5 text-sm font-medium text-indigo-600 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors">View Full Conversation</button>';

    return '<div class="bg-white rounded-2xl border shadow-sm overflow-hidden">' +
      // Header
      '<div class="p-5 border-b bg-gradient-to-r from-gray-50 to-white">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<div class="flex items-center gap-3">' +
            '<div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-lg">' + esc((lead.name || lead.phone_number || '?').charAt(0).toUpperCase()) + '</div>' +
            '<div>' +
              '<h3 class="font-bold text-lg">' + esc(lead.name || lead.phone_number) + '</h3>' +
              (lead.business_name ? '<p class="text-sm text-gray-500">' + esc(lead.business_name) + (lead.industry ? ' - ' + esc(lead.industry) : '') + '</p>' : '') +
            '</div>' +
          '</div>' +
          statusBadge +
        '</div>' +
        '<div class="flex flex-wrap gap-2 mb-2">' +
          '<span class="text-xs text-gray-400 flex items-center gap-1"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>' + esc(lead.phone_number) + '</span>' +
          '<span class="text-xs text-gray-400">' + lead.total_messages + ' messages</span>' +
          '<span class="text-xs text-gray-400">Last: ' + timeAgo(lead.last_activity) + '</span>' +
          (lead.ad_source ? '<span class="badge bg-gray-100 text-gray-500">via ' + esc(lead.ad_source) + '</span>' : '') +
          (tempLabel ? tempLabel : '') +
          (closingLabel ? closingLabel : '') +
        '</div>' +
        (topicBadges ? '<div class="flex flex-wrap gap-1">' + topicBadges + '</div>' : '') +
      '</div>' +
      // Body
      '<div class="p-5">' +
        briefSection +
        meetingSection +
        paymentSection +
        websiteSection +
        auditSection +
        lastMsgSection +
        chatBtn +
      '</div>' +
    '</div>';
  }).join('');

  // Search/filter bar
  var filterBar = '<div class="flex flex-col sm:flex-row gap-3 mb-6">' +
    '<input type="text" id="prep-search" placeholder="Search by name, phone, or business..." class="flex-1 px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none" oninput="filterSalesPrep()">' +
    '<select id="prep-filter" class="px-4 py-2.5 border rounded-xl text-sm bg-white focus:ring-2 focus:ring-indigo-200 outline-none" onchange="filterSalesPrep()">' +
      '<option value="all">All Leads</option>' +
      '<option value="paid">Paid</option>' +
      '<option value="closed">Closed</option>' +
      '<option value="qualified">Qualified</option>' +
      '<option value="open">Open</option>' +
    '</select>' +
    '<select id="prep-temp" class="px-4 py-2.5 border rounded-xl text-sm bg-white focus:ring-2 focus:ring-indigo-200 outline-none" onchange="filterSalesPrep()">' +
      '<option value="">All Temps</option>' +
      '<option value="HOT">🔥 HOT</option>' +
      '<option value="WARM">⚡ WARM</option>' +
      '<option value="COLD">🧊 COLD</option>' +
    '</select>' +
  '</div>';

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<div class="flex items-center justify-between mb-6"><h2 class="text-2xl font-bold">Sales Prep</h2>' +
    '<p class="text-sm text-gray-400">' + active.length + ' leads with activity</p></div>' +
    filterBar +
    '<div id="prep-cards" class="grid lg:grid-cols-2 gap-6">' + (cards || '<div class="col-span-2 text-center text-gray-400 py-12">No leads with activity yet</div>') + '</div>' +
  '</div>';

  // Store for filtering
  window._salesPrepData = active;
}

function filterSalesPrep() {
  var search = (document.getElementById('prep-search').value || '').toLowerCase();
  var filter = document.getElementById('prep-filter').value;
  var temp = (document.getElementById('prep-temp') || {}).value || '';
  var data = window._salesPrepData || [];

  var filtered = data.filter(function(l) {
    // Text search
    var matchSearch = !search || (l.name || '').toLowerCase().includes(search) ||
      (l.phone_number || '').includes(search) ||
      (l.business_name || '').toLowerCase().includes(search);

    // Status filter
    var matchFilter = filter === 'all' ||
      (filter === 'paid' && l.payment_confirmed) ||
      (filter === 'closed' && l.is_closed && !l.payment_confirmed) ||
      (filter === 'qualified' && l.is_qualified && !l.is_closed) ||
      (filter === 'open' && !l.is_qualified);

    // Temperature filter
    var matchTemp = !temp || l.lead_temperature === temp;

    return matchSearch && matchFilter && matchTemp;
  });

  renderSalesPrep(filtered);
  // Restore search/filter values
  document.getElementById('prep-search').value = search;
  document.getElementById('prep-filter').value = filter;
  if (document.getElementById('prep-temp')) document.getElementById('prep-temp').value = temp;
  window._salesPrepData = data; // Restore full data
}

function regenerateSummary(userId, btn) {
  btn.disabled = true;
  btn.textContent = 'Generating...';
  var parent = btn.closest('[id^="brief-"]') || btn.closest('.rounded-xl');
  fetch('/admin/api/sales-prep/' + userId + '/summary', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.summary) {
        parent.outerHTML = '<div class="mt-4 rounded-xl border border-amber-100 overflow-hidden">' +
          '<div class="px-4 py-3 bg-amber-50 border-b border-amber-100 flex items-center justify-between"><h4 class="font-semibold text-amber-800 text-sm">Lead Brief</h4>' +
          '<button onclick="regenerateSummary(\'' + userId + '\', this)" class="text-xs text-amber-600 hover:text-amber-800 font-medium">Regenerate</button></div>' +
          '<div class="p-4 bg-white">' + parseBrief(d.summary) + '</div></div>';
      } else {
        btn.textContent = 'Failed - Try Again';
        btn.disabled = false;
      }
    })
    .catch(function() { btn.textContent = 'Failed - Try Again'; btn.disabled = false; });
}

// ─── Settings (admin-managed pricing) ──────────
// Form-driven editor over /api/settings. Each row is one key from the
// schema returned by the backend; we render label + input + help text
// + a save button per row so the admin can edit one price without
// touching others. Inline status (Saved / Failed) replaces a toast
// because we don't have a toast system here.
function renderSettings(data) {
  var schema = (data && data.schema) || [];
  var values = (data && data.values) || {};

  var rows = schema.map(function(s) {
    var current = values[s.key];
    if (current === undefined || current === null) current = s.fallback;
    var inputAttrs =
      'data-key="' + esc(s.key) + '" ' +
      'class="px-3 py-2 border rounded-lg text-sm w-32 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" ' +
      (s.type === 'number' ? 'type="number" step="1"' : 'type="text"') +
      (s.min != null ? ' min="' + s.min + '"' : '') +
      (s.max != null ? ' max="' + s.max + '"' : '');

    return '' +
      '<div class="bg-white rounded-xl border p-5 mb-3 fade-in">' +
        '<div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">' +
          '<div class="flex-1">' +
            '<label class="block font-semibold text-gray-900">' + esc(s.label) + '</label>' +
            '<p class="text-xs text-gray-500 mt-1">' + esc(s.help || '') + '</p>' +
            '<p class="text-[10px] text-gray-400 mt-1 font-mono">key: ' + esc(s.key) + ' · default: ' + esc(String(s.fallback)) + '</p>' +
          '</div>' +
          '<div class="flex items-center gap-2">' +
            '<input ' + inputAttrs + ' value="' + esc(String(current)) + '">' +
            '<button onclick="saveSetting(this, \'' + esc(s.key) + '\')" ' +
              'class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition disabled:opacity-50">Save</button>' +
            '<span class="text-xs text-gray-500" data-status-for="' + esc(s.key) + '"></span>' +
          '</div>' +
        '</div>' +
      '</div>';
  }).join('');

  document.getElementById('content').innerHTML = '<div class="fade-in">' +
    '<div class="flex items-center justify-between mb-6">' +
      '<div>' +
        '<h2 class="text-2xl font-bold">Pricing &amp; Settings</h2>' +
        '<p class="text-sm text-gray-500 mt-1">Edit a price here and it reflects across chat copy, Stripe links, follow-up messages, and emails. Changes go live immediately — no redeploy.</p>' +
      '</div>' +
      '<button onclick="loadSection(\'settings\')" class="text-sm text-indigo-600 hover:text-indigo-800">Refresh</button>' +
    '</div>' +
    (rows || '<div class="text-gray-500 text-sm">No settings configured.</div>') +
  '</div>';
}

function saveSetting(buttonEl, key) {
  var input = document.querySelector('input[data-key="' + key + '"]');
  var status = document.querySelector('span[data-status-for="' + key + '"]');
  if (!input) return;
  var raw = input.value;
  var num = Number(raw);
  // The schema enforces this on the backend too; we mirror it client-side
  // for instant feedback rather than waiting on the round-trip.
  if (raw === '' || !Number.isFinite(num)) {
    if (status) { status.textContent = 'Enter a valid number'; status.className = 'text-xs text-red-600'; }
    return;
  }
  buttonEl.disabled = true;
  buttonEl.textContent = 'Saving...';
  if (status) { status.textContent = ''; }
  fetch('/admin/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: key, value: num }),
  })
    .then(function(res) { return res.json().then(function(j) { return { ok: res.ok, body: j }; }); })
    .then(function(r) {
      if (!r.ok) {
        if (status) { status.textContent = (r.body && r.body.error) || 'Failed'; status.className = 'text-xs text-red-600'; }
      } else {
        if (status) { status.textContent = 'Saved ✓'; status.className = 'text-xs text-emerald-600'; }
        setTimeout(function() { if (status) status.textContent = ''; }, 3000);
      }
    })
    .catch(function(err) {
      if (status) { status.textContent = err.message || 'Failed'; status.className = 'text-xs text-red-600'; }
    })
    .finally(function() {
      buttonEl.disabled = false;
      buttonEl.textContent = 'Save';
    });
}
